function bindPaneEvents(){
  const {dk}=ctx;

  // plan name edit
  // chip remove
  document.querySelectorAll('.chip-x').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const type=btn.dataset.type;
      const arr=getActual(dk,type);
      arr.splice(parseInt(btn.dataset.idx),1);
      saveActual(dk,type,arr);
      refreshPane(type);renderSlides();
    };
  });

  // add button → picker
  document.querySelectorAll('[data-addtype]').forEach(btn=>{
    btn.onclick=()=>openPicker(btn.dataset.addtype);
  });

  // done check — 현재 탭에 있는 모든 타입
  ctx.tabs.forEach(({type})=>{
    const btn=document.getElementById(`doneBtn-${type}`);
    if(!btn)return;
    btn.onclick=()=>{
      saveDone(dk,type,!getDone(dk,type));
      refreshPane(type);renderSlides();
    };
  });

  // note edit
  // 공유 모드 시작
  document.querySelectorAll('.photo-share-start-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      enterSelectMode(btn.dataset.sharetype);
    };
  });

  // 전체 선택
  document.querySelectorAll('.photo-sel-all-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const type=btn.dataset.seltype;
      const thumbs=document.querySelectorAll(`#photoGrid-${type} .photo-thumb`);
      const allSelected=[...thumbs].every(t=>t.classList.contains('selected'));
      thumbs.forEach(t=>allSelected?t.classList.remove('selected'):t.classList.add('selected'));
      updateSelCount(type);
    };
  });

  // 선택 취소
  document.querySelectorAll('.photo-sel-cancel-btn').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();exitSelectMode(btn.dataset.seltype);};
  });

  // 선택 공유
  document.querySelectorAll('.photo-sel-share-btn').forEach(btn=>{
    btn.onclick=async e=>{
      e.stopPropagation();
      const type=btn.dataset.seltype;
      const thumbs=[...document.querySelectorAll(`#photoGrid-${type} .photo-thumb.selected`)];
      if(!thumbs.length){showToast('공유할 사진을 선택해주세요.');return;}
      const photos=getPhotosCached(dk,type);
      const selected=thumbs.map(t=>parseInt(t.querySelector('.photo-thumb-check').dataset.checkidx));
      await sharePhotos(photos,selected,dk,type);
      exitSelectMode(type);
    };
  });

  // 썸네일 체크 클릭
  document.querySelectorAll('.photo-thumb-check').forEach(div=>{
    div.onclick=e=>{
      e.stopPropagation();
      const thumb=div.closest('.photo-thumb');
      thumb.classList.toggle('selected');
      updateSelCount(div.dataset.checktype);
    };
  });
  document.querySelectorAll('.photo-file-input').forEach(inp=>{
    inp.onchange=e=>{
      const type=inp.dataset.phototype;
      const files=Array.from(inp.files);
      if(!files.length) return;
      const photos=getPhotosCached(dk,type);
      const remaining=5-photos.length;
      const toLoad=files.slice(0,remaining);
      const skipped=files.length-toLoad.length;
      let loaded=0;
      toLoad.forEach(file=>{
        const reader=new FileReader();
        reader.onload=async ev=>{
          try{
            const dataUrl=await compressImage(ev.target.result);
            photos.push(dataUrl);
          }catch(e){
            // 압축 실패 시 원본 사용
            photos.push(ev.target.result);
          }
          loaded++;
          if(loaded===toLoad.length){
            await savePhotos(dk,type,photos);
            photoCache[`${dk}:${type}`]=photos;
            refreshPane(type);
            if(skipped>0) showToast(`${toLoad.length}장 추가됐어요. (${skipped}장 초과로 제외)`);
          }
        };
        reader.readAsDataURL(file);
      });
      inp.value='';
    };
  });

  // 사진 삭제
  document.querySelectorAll('.photo-thumb-del').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const type=btn.dataset.deltype;
      const idx=parseInt(btn.dataset.delidx);
      getPhotos(dk,type).then(async photos=>{
        photos.splice(idx,1);
        await savePhotos(dk,type,photos);
        photoCache[`${dk}:${type}`]=photos;
        refreshPane(type);
      });
    };
  });

  // 사진 뷰어 열기
  document.querySelectorAll('.photo-thumb-view').forEach(div=>{
    div.onclick=e=>{
      e.stopPropagation();
      const type=div.dataset.phototype;
      const idx=parseInt(div.dataset.photoidx);
      openPhotoViewer(dk,type,idx);
    };
  });
  // 메모 삭제 버튼 — 인라인 확인
  ctx.tabs.forEach(({type})=>{
    const delBtn=document.getElementById(`memoDelBtn-${type}`);
    const confirmEl=document.getElementById(`memoDelConfirm-${type}`);
    const yesBtn=document.getElementById(`memoDelYes-${type}`);
    const noBtn=document.getElementById(`memoDelNo-${type}`);
    if(!delBtn||!confirmEl) return;
    if(!getNote(ctx.dk,type)) delBtn.style.display='none';
    delBtn.onclick=e=>{
      e.stopPropagation();
      delBtn.style.display='none';
      confirmEl.style.display='flex';
    };
    yesBtn.onclick=e=>{
      e.stopPropagation();
      saveNote(ctx.dk,type,'');
      renderSlides();
      refreshPane(type);
    };
    noBtn.onclick=e=>{
      e.stopPropagation();
      confirmEl.style.display='none';
      if(getNote(ctx.dk,type)) delBtn.style.display='';
    };
  });

  // 메모 복사 버튼
  ctx.tabs.forEach(({type})=>{
    const btn=document.getElementById(`memoCopyBtn-${type}`);
    if(!btn) return;
    btn.onclick=e=>{
      e.stopPropagation();
      const text=getNote(ctx.dk,type);
      if(!text){btn.textContent='없음';setTimeout(()=>{btn.textContent='📋 복사';},1200);return;}
      navigator.clipboard.writeText(text).then(()=>{
        btn.textContent='✓ 복사됨';
        setTimeout(()=>{btn.textContent='📋 복사';},1500);
      }).catch(()=>{
        const ta=document.createElement('textarea');
        ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
        document.body.appendChild(ta);ta.select();document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent='✓ 복사됨';
        setTimeout(()=>{btn.textContent='📋 복사';},1500);
      });
    };
  });
  ctx.tabs.forEach(({type})=>{
    const ta=document.getElementById(`noteTa-${type}`);
    if(!ta)return;
    ta.onblur=()=>{ saveNote(dk,type,ta.value); renderSlides(); updateMemoDelBtn(type); };
    ta.onclick=e=>e.stopPropagation();
    const saveBtn=document.querySelector(`[data-notesave="${type}"]`);
    if(saveBtn) saveBtn.onclick=e=>{ e.stopPropagation(); saveNote(dk,type,ta.value); renderSlides(); updateMemoDelBtn(type); };
  });
}

async function refreshPane(type){
  const item=ctx.tabs.find(t=>t.type===type);
  if(!item)return;
  // 사진 캐시 미리 로드
  await loadPhotoCache(ctx.dk,type);
  const panesEl=document.getElementById('modalPanes');
  const oldPane=panesEl.querySelector(`[data-ptype="${type}"]`);
  if(!oldPane)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=buildPane(item);
  const newPane=tmp.firstElementChild;
  newPane.style.display=type===ctx.activeType?'block':'none';
  panesEl.replaceChild(newPane,oldPane);
  bindPaneEvents();
}

let pickerType='',pickerSel=[],editingId=null,confirmDelId=null;

function openPicker(type){
  pickerType=type;
  pickerSel=[...getActual(ctx.dk,type)];
  editingId=null;confirmDelId=null;
  document.getElementById('pickerPopup').className=`picker-popup`;
  document.getElementById('pickerTitle').textContent=`${typeIcon(type)} ${typeName(type)} 운동 선택`;
  document.getElementById('pickerDone').className=`picker-done picker-done-${type}`;
  document.getElementById('pickerCustomInp').value='';
  renderPicker();
  document.getElementById('pickerBackdrop').classList.add('open');
}

function renderPicker(){
  const type=pickerType;
  const customs=getCustomOpts(type);
  let html='';

  DEFAULT_OPTS[type].forEach(opt=>{
    const sel=pickerSel.includes(opt);
    html+=`<div class="picker-item${sel?` sel-${type}`:''}" data-opt="${esc(opt)}">
      <span class="picker-lbl">${opt}</span>
      <span class="picker-check">✓</span>
    </div>`;
  });

  customs.forEach(({id,label})=>{
    if(editingId===id){
      html+=`<div class="picker-editing">
        <input class="picker-edit-inp" id="pei-${id}" value="${esc(label)}" maxlength="30">
        <button class="pe-save" id="pes-${id}">저장</button>
        <button class="pe-cancel" id="pec-${id}">취소</button>
      </div>`;
    } else if(confirmDelId===id){
      html+=`<div class="del-confirm">
        <span class="del-confirm-txt">'${esc(label)}' 삭제?</span>
        <button class="del-yes" id="dy-${id}">삭제</button>
        <button class="del-no"  id="dn-${id}">취소</button>
      </div>`;
    } else {
      const sel=pickerSel.includes(label);
      html+=`<div class="picker-item${sel?` sel-${type}`:''}" data-opt="${esc(label)}" data-cid="${id}">
        <span class="picker-lbl">${label}</span>
        <span class="picker-check">✓</span>
        <button class="picker-edit-btn" data-eid="${id}">✏️</button>
        <button class="picker-del-btn"  data-did="${id}">🗑</button>
      </div>`;
    }
  });

  document.getElementById('pickerList').innerHTML=html;

  // select toggle
  document.querySelectorAll('.picker-item[data-opt]').forEach(item=>{
    item.addEventListener('click',e=>{
      if(e.target.closest('.picker-edit-btn,.picker-del-btn'))return;
      const opt=item.dataset.opt;
      pickerSel.includes(opt)?pickerSel=pickerSel.filter(x=>x!==opt):pickerSel.push(opt);
      renderPicker();
    });
  });

  // edit btn
  document.querySelectorAll('.picker-edit-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();editingId=btn.dataset.eid;confirmDelId=null;renderPicker();const inp=document.getElementById(`pei-${editingId}`);if(inp){inp.focus();inp.select();}});
  });

  // del btn
  document.querySelectorAll('.picker-del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();confirmDelId=btn.dataset.did;editingId=null;renderPicker();});
  });

  // del yes/no
  document.querySelectorAll('[id^="dy-"]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.id.replace('dy-','');
      const lbl=getCustomOpts(pickerType).find(o=>o.id===id)?.label;
      if(lbl) pickerSel=pickerSel.filter(x=>x!==lbl);
      deleteCustomOpt(pickerType,id);confirmDelId=null;renderPicker();
    });
  });
  document.querySelectorAll('[id^="dn-"]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();confirmDelId=null;renderPicker();});
  });

  // edit save/cancel
  document.querySelectorAll('[id^="pes-"]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.id.replace('pes-','');
      const inp=document.getElementById(`pei-${id}`);
      const nl=inp?.value.trim();
      if(nl){
        const old=getCustomOpts(pickerType).find(o=>o.id===id)?.label;
        if(old) pickerSel=pickerSel.map(x=>x===old?nl:x);
        renameCustomOpt(pickerType,id,nl);
      }
      editingId=null;renderPicker();
    });
  });
  document.querySelectorAll('[id^="pec-"]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();editingId=null;renderPicker();});
  });
  document.querySelectorAll('[id^="pei-"]').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      const id=inp.id.replace('pei-','');
      if(e.key==='Enter'){e.preventDefault();document.getElementById(`pes-${id}`)?.click();}
      if(e.key==='Escape'){editingId=null;renderPicker();}
    });
  });
}

const DAY_SHORT=['일','월','화','수','목','금','토'];
let editRoutine=null;

function openSettings(){
  editRoutine=JSON.parse(JSON.stringify(getRoutine()));
  injectWD(editRoutine);

  document.getElementById('settingsOverlay').classList.add('open');
  document.body.style.overflow='hidden';

  // 버튼 핸들러 먼저 등록 (패널 HTML은 이미 DOM에 있음)
  document.getElementById('settingsClose').onclick=closeSettings;
  document.getElementById('settingsOverlay').onclick=e=>{if(e.target===document.getElementById('settingsOverlay'))closeSettings();};
  document.getElementById('settingsSave').onclick=()=>{
    const clean=JSON.parse(JSON.stringify(editRoutine));
    clean.weeks.forEach(wk=>wk.forEach(day=>day.forEach(item=>{delete item._w;delete item._d;})));

    closeSettings();
    saveRoutine(clean);
    renderSlides();
  };
  document.getElementById('settingsSaveDefault').onclick=()=>{
    // 확인 팝업 표시
    document.getElementById('saveDefaultConfirm').style.display='block';
  };
  document.getElementById('saveDefaultNo').onclick=()=>{
    document.getElementById('saveDefaultConfirm').style.display='none';
  };
  document.getElementById('saveDefaultYes').onclick=()=>{
    const clean=JSON.parse(JSON.stringify(editRoutine));
    clean.weeks.forEach(wk=>wk.forEach(day=>day.forEach(item=>{delete item._w;delete item._d;})));
    saveUserDefault(clean);
    saveRoutine(clean);
    renderSlides();
    document.getElementById('saveDefaultConfirm').style.display='none';
    const btn=document.getElementById('settingsSaveDefault');
    const orig=btn.textContent;
    btn.textContent='✓ 저장됨';
    btn.style.borderColor='var(--lime)';
    setTimeout(()=>{btn.textContent=orig;btn.style.borderColor='';},1800);
  };
  document.getElementById('settingsReset').onclick=()=>{
    const userDefault=getUserDefault();
    const base=userDefault||JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
    editRoutine=JSON.parse(JSON.stringify(base));
    injectWD(editRoutine);
    document.getElementById('saveDefaultConfirm').style.display='none';
    renderSettingsPanel();
    // 어떤 기본값 불러왔는지 피드백
    const btn=document.getElementById('settingsReset');
    const orig=btn.textContent;
    btn.textContent=userDefault?'✓ 내 기본값 불러옴':'✓ 시스템 기본값 불러옴';
    setTimeout(()=>{btn.textContent=orig;},1800);
  };

  renderSettingsPanel();
}
function closeSettings(){
  document.getElementById('settingsOverlay').classList.remove('open');
  document.body.style.overflow='';
  editRoutine=null;
}

function renderSettingsPanel(){
  const confirmEl=document.getElementById('saveDefaultConfirm');
  if(confirmEl) confirmEl.style.display='none';
  const {cycle,weeks}=editRoutine;

  // 사이클 버튼
  document.querySelectorAll('.cycle-btn').forEach(btn=>{
    btn.className='cycle-btn'+(parseInt(btn.dataset.cycle)===cycle?' active':'');
    btn.onclick=()=>{
      const newCycle=parseInt(btn.dataset.cycle);
      if(newCycle===editRoutine.cycle)return;
      const oldWeeks=editRoutine.weeks;
      const newWeeks=[];
      for(let w=0;w<newCycle;w++){
        newWeeks.push(oldWeeks[w%oldWeeks.length].map(day=>JSON.parse(JSON.stringify(day))));
      }
      editRoutine={cycle:newCycle,weeks:newWeeks};
      injectWD(editRoutine);
      renderSettingsPanel();
    };
  });

  // 테이블
  const table=document.getElementById('routineTable');
  let html=`<div class="rt-scroll"><table class="rt-table">
    <thead><tr><th class="rt-day-head"></th>`;
  for(let w=0;w<cycle;w++) html+=`<th class="rt-week-head">${cycle>1?`${w+1}주차`:''}</th>`;
  html+=`</tr></thead><tbody>`;

  for(let d=0;d<7;d++){
    html+=`<tr><td class="rt-day-cell">${DAY_SHORT[d]}</td>`;
    for(let w=0;w<cycle;w++){
      const items=weeks[w][d]||[];
      const types=items.map(i=>i.type);
      const hasGolf=types.includes('golf');
      const ALL_TYPES=['run','golf','swim','bike','tennis'];
      const activeItems=items.filter(i=>i.type!=='rest'); // editRoutine 순서대로
      const inactiveTypes=ALL_TYPES.filter(t=>!activeItems.some(i=>i.type===t));

      // 선택된 항목 (위, 드래그 가능)
      const activeRows=activeItems.map(item=>`
        <div class="rt-row-item rt-active" draggable="true" data-w="${w}" data-d="${d}" data-t="${item.type}">
          <span class="rt-drag-handle">⠿</span>
          <button class="rt-type-btn sel-${item.type}" data-w="${w}" data-d="${d}" data-t="${item.type}">${typeIcon(item.type)}</button>
          <input class="rt-name-input" data-w="${w}" data-d="${d}" data-t="${item.type}"
            value="${esc(item.defaultName||typeDefName(item.type))}" placeholder="${typeDefName(item.type)}">
        </div>`).join('');

      // 비선택 항목 (아이콘만, 클릭으로 추가)
      const inactiveRows=inactiveTypes.length>0?`
        <div class="rt-inactive-row">
          ${inactiveTypes.map(t=>`
            <button class="rt-inactive-btn" data-w="${w}" data-d="${d}" data-t="${t}" title="${typeName(t)} 추가">
              ${typeIcon(t)}
            </button>`).join('')}
        </div>`:'';

      // 구분선 (선택/비선택 사이)
      const divider=activeItems.length>0&&inactiveTypes.length>0
        ? `<div class="rt-section-divider"></div>` : '';

      html+=`<td class="rt-cell" data-w="${w}" data-d="${d}">${activeRows}${divider}${inactiveRows}</td>`;
    }
    html+=`</tr>`;
  }
  html+=`</tbody></table></div>`;
  table.innerHTML=html;

  // 셀 버튼 클릭 (선택된 항목 토글)
  table.querySelectorAll('.rt-type-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const w=parseInt(btn.dataset.w),d=parseInt(btn.dataset.d),t=btn.dataset.t;
      toggleRoutineType(w,d,t);
    };
  });

  // 비선택 아이콘 버튼 클릭 (항목 추가)
  table.querySelectorAll('.rt-inactive-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const w=parseInt(btn.dataset.w),d=parseInt(btn.dataset.d),t=btn.dataset.t;
      toggleRoutineType(w,d,t);
    };
  });

  // 셀 이름 편집
  table.querySelectorAll('.rt-name-input:not(:disabled)').forEach(inp=>{
    inp.oninput=()=>{
      const w=parseInt(inp.dataset.w),d=parseInt(inp.dataset.d),t=inp.dataset.t;
      const item=editRoutine.weeks[w][d].find(i=>i.type===t);
      if(item) item.defaultName=inp.value;
    };
    inp.onclick=e=>e.stopPropagation();
  });

  // 드래그앤드롭 — 선택된 항목끼리만 순서 변경
  let dragSrcType=null, dragSrcW=null, dragSrcD=null;

  table.querySelectorAll('.rt-active[draggable="true"]').forEach(row=>{
    const type=row.dataset.t;
    const w=parseInt(row.dataset.w), d=parseInt(row.dataset.d);

    row.addEventListener('dragstart',e=>{
      dragSrcType=type; dragSrcW=w; dragSrcD=d;
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>row.classList.add('dragging'),0);
    });
    row.addEventListener('dragend',()=>{
      row.classList.remove('dragging');
      table.querySelectorAll('.rt-row-item').forEach(r=>r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover',e=>{
      if(w!==dragSrcW||d!==dragSrcD||type===dragSrcType) return;
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      table.querySelectorAll('.rt-row-item').forEach(r=>r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrcType===type||dragSrcW!==w||dragSrcD!==d) return;
      const arr=editRoutine.weeks[w][d];
      const srcIdx=arr.findIndex(i=>i.type===dragSrcType);
      const tgtIdx=arr.findIndex(i=>i.type===type);
      if(srcIdx===-1||tgtIdx===-1) return;
      const [moved]=arr.splice(srcIdx,1);
      arr.splice(tgtIdx,0,moved);
      injectWD(editRoutine);
      renderSettingsPanel();
    });
  });
}

function toggleRoutineType(w,d,t){
  const items=editRoutine.weeks[w][d];
  const idx=items.findIndex(i=>i.type===t);
  if(idx>=0){
    items.splice(idx,1);
  } else {
    // 현재 입력창에 값이 있으면 그걸 기본값으로 사용
    const inp=document.querySelector(`.rt-name-input[data-w="${w}"][data-d="${d}"][data-t="${t}"]`);
    const defName=(inp?.value.trim())||typeDefName(t);
    items.push({type:t,defaultName:defName});
  }
  injectWD(editRoutine);
  renderSettingsPanel();
}

// buildCellNames에서 w,d 주입을 위해 renderSettingsPanel에서 items에 _w,_d 추가
// → renderSettingsPanel 재호출 전에 weeks에 _w,_d inject
function injectWD(routine){
  routine.weeks.forEach((week,w)=>{
    week.forEach((day,d)=>{
      day.forEach(item=>{item._w=w;item._d=d;});
    });
  });
}

async function sharePhotos(photos,indices,dk,type){
  const files=await Promise.all(indices.map(async(i)=>{
    const res=await fetch(photos[i]);
    const blob=await res.blob();
    return new File([blob],`workout_${dk}_${type}_${i+1}.jpg`,{type:blob.type});
  }));
  if(navigator.share&&navigator.canShare&&navigator.canShare({files})){
    try{ await navigator.share({files,title:'운동 사진'}); }
    catch(err){ if(err.name!=='AbortError') showToast('공유 실패: '+err.message); }
  } else {
    // 데스크톱: 순차 다운로드
    files.forEach((f,i)=>{
      setTimeout(()=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(f);
        a.download=f.name;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      },i*300);
    });
    showToast(`${files.length}장 다운로드됐어요.`);
  }
}

function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  document.body.style.overflow='hidden';

  document.getElementById('searchInput').value='';
  document.getElementById('searchCount').textContent='';

  document.getElementById('searchClear').classList.remove('visible');
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.body.style.overflow='';

function runSearch(query){
  const q=query.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('visible',q.length>0);
  if(!q){
    document.getElementById('searchCount').textContent='';
    document.getElementById('searchResults').innerHTML='<div class="search-empty">검색어를 입력하면 메모를 찾아드릴게요.</div>';
    return;
  }

  // NOTES_KEY에서 모든 메모 검색
  const notes=load(NOTES_KEY);
  const results=[];

  for(const [key,text] of Object.entries(notes)){
    if(!text||!text.toLowerCase().includes(q)) continue;
    // key 형식: "2026-06-10:golf" 또는 "2026-06-10:run" 등
    const parts=key.split(':');
    if(parts.length<2) continue;
    const dk=parts[0];
    const type=parts.slice(1).join(':'); // extra 타입 포함 대비
    const [y,m,d]=dk.split('-').map(Number);
    if(!y||!m||!d) continue;
    results.push({dk,type,text,date:new Date(y,m-1,d)});
  }

  // 최신순 정렬
  results.sort((a,b)=>b.date-a.date);

  const countEl=document.getElementById('searchCount');
  const resultsEl=document.getElementById('searchResults');

  if(!results.length){
    countEl.textContent='';
    resultsEl.innerHTML='<div class="search-empty">검색 결과가 없어요.</div>';
    return;
  }

  countEl.textContent=`${results.length}개의 메모를 찾았어요`;

  resultsEl.innerHTML=results.map(r=>{
    const dateStr=`${r.date.getFullYear()}년 ${r.date.getMonth()+1}월 ${r.date.getDate()}일 (${DAY_KO[r.date.getDay()]})`;
    const typeLabel=typeName(r.type.split(':')[0]);
    const typeIcon_=typeIcon(r.type.split(':')[0]);
    const color=typeColor(r.type.split(':')[0]);
    // 검색어 하이라이트
    const highlighted=esc(r.text).replace(
      new RegExp(esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),
      m=>`<mark>${m}</mark>`
    );
    return`<div class="search-result-card" data-dk="${r.dk}" data-type="${r.type}" data-text="${esc(r.text)}">
      <div class="search-result-header">
        <span class="search-result-date">${dateStr}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="search-result-type" style="background:${color}22;color:${color}">${typeIcon_} ${typeLabel}</span>
          <button class="search-copy-btn" data-text="${esc(r.text)}" title="메모 복사">📋</button>
        </div>
      </div>
      <div class="search-result-memo">${highlighted}</div>
    </div>`;
  }).join('');

  // 복사 버튼
  resultsEl.querySelectorAll('.search-copy-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const text=btn.dataset.text;
      navigator.clipboard.writeText(text).then(()=>{
        const orig=btn.textContent;
        btn.textContent='✓';
        btn.style.color='var(--lime)';
        setTimeout(()=>{btn.textContent=orig;btn.style.color='';},1500);
      }).catch(()=>{
        // fallback
        const ta=document.createElement('textarea');
        ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
        document.body.appendChild(ta);ta.select();document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent='✓';setTimeout(()=>{btn.textContent='📋';},1500);
      });
    };
  });
  resultsEl.querySelectorAll('.search-result-card').forEach(card=>{
    card.onclick=()=>{
      const dk=card.dataset.dk;
      const type=card.dataset.type.split(':')[0];
      const [y,m,d]=dk.split('-').map(Number);
      const targetDate=new Date(y,m-1,d);
      curWeek=getWeekStart(targetDate);
      renderSlides();
      closeSearch();
      // 렌더 후 모달 열기
      const dayIndex=targetDate.getDay();
      const dateLabel=fmtFull(targetDate);
      const offset=weekOffset(curWeek);
      openModal(dayIndex,dk,dateLabel,type,offset);
    };
  });
}

function buildCalGrid(year, month){
  const today=new Date(); today.setHours(0,0,0,0);
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=firstDay.getDay();
  let html='';
  for(let i=startDow-1;i>=0;i--){
    html+=calDayHTML(new Date(year,month,-i),today,true);
  }
  for(let d=1;d<=lastDay.getDate();d++){
    html+=calDayHTML(new Date(year,month,d),today,false);
  }
  const trailing=42-(startDow+lastDay.getDate());
  for(let i=1;i<=trailing;i++){
    html+=calDayHTML(new Date(year,month+1,i),today,true);
  }
  return`<div class="calpicker-days">${html}</div>`;
}

function monthOffset(year,month,delta){
  let m=month+delta;
  let y=year;
  if(m>11){m-=12;y++;}
  if(m<0){m+=12;y--;}
  return{year:y,month:m};
}

function renderCalPicker(){
  document.getElementById('calTitle').textContent=`${calYear}년 ${calMonth+1}월`;
  const prev=monthOffset(calYear,calMonth,-1);
  const next=monthOffset(calYear,calMonth,1);
  document.getElementById('calVSlidePrev').innerHTML=buildCalGrid(prev.year,prev.month);
  document.getElementById('calVSlideCurr').innerHTML=buildCalGrid(calYear,calMonth);
  document.getElementById('calVSlideNext').innerHTML=buildCalGrid(next.year,next.month);
  const vtrack=document.getElementById('calVTrack');
  vtrack.style.transition='none';
  vtrack.style.transform='translateY(-33.333%)';
  bindCalGridClicks();
}

function bindCalGridClicks(){
  document.querySelectorAll('#calVSlideCurr .calpicker-day').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const ts=parseInt(el.dataset.ts);
      const clicked=new Date(ts);
      curWeek=getWeekStart(clicked);
      renderSlides();
      closeCalPicker();
    };
  });
}

function goCalMonth(delta){
  const o=monthOffset(calYear,calMonth,delta);
  calYear=o.year; calMonth=o.month;
  renderCalPicker();
}

// 터치 스와이프 (상하 + 좌우)
(function(){
  let sx=0,sy=0,sw=false,sdx=0,sdy=0,hlock=false,vlock=false;
  document.addEventListener('touchstart',e=>{
    if(!document.getElementById('calPickerOverlay').classList.contains('open')) return;
    if(document.getElementById('drumOverlay').classList.contains('open')) return;
    sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    sw=false; hlock=false; vlock=false; sdx=0; sdy=0;
    document.getElementById('calVTrack').style.transition='none';
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!document.getElementById('calPickerOverlay').classList.contains('open')) return;
    if(document.getElementById('drumOverlay').classList.contains('open')) return;
    const dx=e.touches[0].clientX-sx;
    const dy=e.touches[0].clientY-sy;
    if(!sw){
      if(Math.abs(dx)<6&&Math.abs(dy)<6) return;
      if(Math.abs(dy)>Math.abs(dx)) vlock=true;
      else hlock=true;
      sw=true;
    }
    const vt=document.getElementById('calVTrack');
    if(vlock){
      sdy=dy;
      const h=document.querySelector('.cal-v-outer').offsetHeight;
      const pct=33.333-(sdy/h*100);
      vt.style.transform=`translateY(-${pct}%)`;
    }
    if(hlock){
      sdx=dx;
      // 수평은 전체 날짜 영역을 translateX로 이동
      document.getElementById('calVSlideCurr').style.transform=`translateX(${sdx}px)`;
    }
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(!sw){sw=false;return;}
    sw=false;
    if(vlock){
      const h=document.querySelector('.cal-v-outer').offsetHeight;
      if(sdy<-h*0.2) goCalMonth(1);
      else if(sdy>h*0.2) goCalMonth(-1);
      else renderCalPicker();
    }
    if(hlock){
      const w=document.querySelector('.cal-v-outer').offsetWidth;
      document.getElementById('calVSlideCurr').style.transform='';
      if(sdx<-w*0.2) goCalMonth(1);
      else if(sdx>w*0.2) goCalMonth(-1);
    }
  });
})();

function calDayHTML(date,today,otherMonth){
  const ws=getWeekStart(date);
  const isSelectedWeek=ws.getTime()===curWeek.getTime();
  const isToday=date.getTime()===today.getTime();
  const isWeekStart=date.getDay()===0;
  const isWeekEnd=date.getDay()===6;
  const isHol=date.getDay()===0||date.getDay()===6||isPublicHoliday(date);
  let cls='calpicker-day';
  if(otherMonth) cls+=' other-month';
  if(isHol&&!otherMonth) cls+=' holiday';
  if(isToday) cls+=' today';
  if(isSelectedWeek){
    cls+=' selected-week';
    if(isWeekStart) cls+=' week-start';
    if(isWeekEnd) cls+=' week-end';
    if(!isWeekStart&&!isWeekEnd) cls+=' week-mid';
  }
  return`<div class="${cls}" data-ts="${date.getTime()}">${date.getDate()}</div>`;
}

document.getElementById('calTitle').onclick=e=>{e.stopPropagation();openDrumPicker();};

function openDrumPicker(){
  document.getElementById('drumOverlay').classList.add('open');
  const todayYear=new Date().getFullYear();
  buildDrum('drumYear', todayYear-10, todayYear+10, calYear);
  buildDrum('drumMonth', 1, 12, calMonth+1, m=>m+'월');
}

function buildDrum(id, min, max, selected, fmt){
  const el=document.getElementById(id);
  el.innerHTML='';

  // 패딩
  const pad1=document.createElement('div');pad1.style.height='68px';el.appendChild(pad1);
  for(let v=min;v<=max;v++){
    const div=document.createElement('div');
    div.className='drum-item'+(v===selected?' active':'');
    div.textContent=fmt?fmt(v):v;
    div.dataset.val=v;
    // 클릭으로 선택
    div.onclick=e=>{
      e.stopPropagation();
      el.querySelectorAll('.drum-item').forEach(i=>i.classList.remove('active'));
      div.classList.add('active');
      // 클릭한 항목 중앙으로 스크롤 (scrollTop 기준)
      const itemScrollTop=div.offsetTop-(el.clientHeight/2)+(div.clientHeight/2);
      el.scrollTo({top:itemScrollTop,behavior:'smooth'});
    };
    el.appendChild(div);
  }
  const pad2=document.createElement('div');pad2.style.height='68px';el.appendChild(pad2);

  // 선택 항목으로 초기 스크롤 — 렌더 완료 후 실행
  setTimeout(()=>{
    const sel=el.querySelector('.drum-item.active');
    if(sel){
      const itemScrollTop=sel.offsetTop-(el.clientHeight/2)+(sel.clientHeight/2);
      el.scrollTop=itemScrollTop;
    }
  },50);

  // 스크롤 멈추면 중앙 항목 active 표시
  let t;
  el.addEventListener('scroll',()=>{
    clearTimeout(t);
    t=setTimeout(()=>{
      const elRect=el.getBoundingClientRect();
      const center=elRect.top+elRect.height/2;
      let closest=null,minD=Infinity;
      el.querySelectorAll('.drum-item').forEach(item=>{
        const r=item.getBoundingClientRect();
        const d=Math.abs((r.top+r.height/2)-center);
        if(d<minD){minD=d;closest=item;}
      });
      el.querySelectorAll('.drum-item').forEach(i=>i.classList.remove('active'));
      if(closest) closest.classList.add('active');
    },120);
  },{passive:true});
}

function getDrumVal(id){
  const el=document.getElementById(id);
  const active=el.querySelector('.drum-item.active');
  return active?parseInt(active.dataset.val):null;
}

document.getElementById('drumDone').onclick=e=>{
  e.stopPropagation();
  const y=getDrumVal('drumYear');
  const m=getDrumVal('drumMonth');
  if(y) calYear=y;
  if(m) calMonth=m-1;
  document.getElementById('drumOverlay').classList.remove('open');
  renderCalPicker();
};

document.getElementById('calPrev').onclick=e=>{e.stopPropagation();goCalMonth(-1);};
document.getElementById('calNext').onclick=e=>{e.stopPropagation();goCalMonth(1);};
document.getElementById('calPickerOverlay').onclick=e=>{if(e.target===document.getElementById('calPickerOverlay'))closeCalPicker();};
