<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이번 주 운동 일정</title>
  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="운동일정">
  <meta name="theme-color" content="#0D1810">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0D1810;--surface:#141F14;--card:#1A2B1A;--card-hover:#1F3320;
      --lime:#A3E635;--lime-dim:#6B9E1F;--sky:#38BDF8;--rose:#FB7185;
      --purple:#C084FC;--muted:#4B6B4B;--text:#D1E8D1;--subtext:#7A9E7A;
      --aqua:#22D3EE;--amber:#FBBF24;--green:#4ADE80;
      --today-glow:0 0 0 1.5px #A3E635,0 0 24px 4px rgba(163,230,53,0.18);
    }
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;}

    /* Swipe */
    .page-outer{overflow:hidden;width:100%;}
    /* Drive 동기화 */
    .gd-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:8px 16px 0;max-width:860px;margin:0 auto;}
    .gd-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;display:flex;align-items:center;gap:6px;}
    .gd-btn:hover{background:rgba(255,255,255,0.15);}
    .gd-spin{display:inline-block;animation:spin 0.8s linear infinite;}
    .gd-btn-save{background:rgba(163,230,53,0.1);border-color:rgba(163,230,53,0.25);color:var(--lime);}
    .gd-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
    .gd-overlay.open{display:flex;}
    .gd-box{background:#1A2B1A;border:1px solid rgba(163,230,53,0.25);border-radius:20px;padding:28px;width:min(310px,90vw);display:flex;flex-direction:column;gap:12px;}
    .gd-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px;}
    .gd-desc{font-size:12px;color:var(--subtext);text-align:center;line-height:1.6;margin-bottom:4px;}
    .gd-action-btn{width:100%;padding:11px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
    .gd-save-btn{background:var(--lime);color:var(--bg);}
    .gd-load-btn{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid rgba(255,255,255,0.15);}
    .gd-close-btn{background:none;border:none;color:var(--subtext);font-size:12px;cursor:pointer;text-align:center;text-decoration:underline;font-family:'Noto Sans KR',sans-serif;}
    /* 로딩 오버레이 */
    .loading-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0.7);backdrop-filter:blur(3px);align-items:center;justify-content:center;flex-direction:column;gap:16px;}
    .loading-overlay.open{display:flex;}
    .loading-spinner{width:48px;height:48px;border:4px solid rgba(163,230,53,0.2);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-msg{color:#fff;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;}
    /* 원형 진행률 */
    .progress-ring-wrap{position:relative;width:80px;height:80px;display:none;align-items:center;justify-content:center;}
    .progress-ring-wrap.show{display:flex;}
    .progress-ring{transform:rotate(-90deg);}
    .progress-ring-bg{fill:none;stroke:rgba(163,230,53,0.15);stroke-width:6;}
    .progress-ring-bar{fill:none;stroke:var(--lime);stroke-width:6;stroke-linecap:round;stroke-dasharray:219.9;stroke-dashoffset:219.9;transition:stroke-dashoffset 0.3s ease;}
    .progress-ring-pct{position:absolute;font-size:15px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;}
    /* 완료 토스트 (더 크게) */
    .toast-big{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A2B1A;border:2px solid var(--lime);color:#fff;border-radius:16px;padding:14px 24px;font-size:15px;font-weight:700;z-index:700;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
    .toast-big.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .page-track{display:flex;transition:transform 0.38s cubic-bezier(0.4,0,0.2,1);will-change:transform;}
    .page-slide{min-width:100vw;width:100vw;padding:40px 20px 60px;flex-shrink:0;}

    /* Week Nav */
    .week-nav{max-width:860px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;position:relative;min-height:38px;}
    .nav-btn{background:rgba(163,230,53,0.08);border:1px solid rgba(163,230,53,0.18);color:var(--lime);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:background 0.15s;-webkit-tap-highlight-color:transparent;}
    .nav-btn:hover{background:rgba(163,230,53,0.16);}
    .nav-btn-prev{position:absolute;left:0;}
    .nav-btn-next{position:absolute;right:0;}
    .nav-center{text-align:center;}
    .week-label{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--lime);}
    .week-dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-top:8px;}
    .week-dot{width:5px;height:5px;border-radius:50%;background:rgba(163,230,53,0.2);transition:all 0.2s;}
    .week-dot.active{background:var(--lime);width:16px;border-radius:3px;}
    .this-week-btn{display:none;background:rgba(163,230,53,0.1);border:1px solid rgba(163,230,53,0.25);color:var(--lime);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-top:5px;}
    .this-week-btn.visible{display:inline-block;}

    /* Page Header */
    .page-header{max-width:860px;margin:0 auto 32px;}
    .page-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:700;color:#fff;line-height:1.15;letter-spacing:-0.02em;}
    .page-header h1 span{color:var(--lime);}
    .header-meta{margin-top:10px;font-size:13px;color:var(--subtext);display:flex;gap:16px;flex-wrap:wrap;}
    .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--subtext);}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* Cards */
    .schedule-grid{max-width:860px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
    .day-card{background:var(--card);border:1px solid rgba(163,230,53,0.07);border-radius:14px;padding:22px 20px;transition:background 0.2s,transform 0.15s;position:relative;overflow:hidden;cursor:pointer;}
    .day-card:hover{background:var(--card-hover);transform:translateY(-2px);}
    .day-card.today{box-shadow:var(--today-glow);border-color:rgba(163,230,53,0.35);}
    .day-card.today::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--lime),transparent);}
    .day-card.past{opacity:0.5;}
    .card-date-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
    .card-dayname{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;}
    .card-dayname.holiday{color:#FF6B6B;}
    .card-date{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;color:var(--muted);}
    .today-badge{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--bg);background:var(--lime);padding:2px 8px;border-radius:20px;}
    .activities{display:flex;flex-direction:column;gap:8px;}
    .activity{display:flex;align-items:center;gap:9px;border-radius:8px;padding:5px 6px;margin:-5px -6px;}
    .activity-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
    .activity-body{flex:1;min-width:0;}
    .activity-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.2;}
    .activity-sub{font-size:11px;color:var(--subtext);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .act-tag{font-size:10px;font-weight:700;letter-spacing:0.06em;padding:2px 7px;border-radius:12px;flex-shrink:0;}
    .act-tag-golf{background:rgba(163,230,53,0.13);color:var(--lime);}
    .act-tag-run{background:rgba(56,189,248,0.13);color:var(--sky);}
    .act-tag-swim{background:rgba(34,211,238,0.13);color:var(--aqua);}
    .act-tag-tennis{background:rgba(251,191,36,0.13);color:var(--amber);}
    .act-tag-bike{background:rgba(74,222,128,0.13);color:var(--green);}
    .act-tag-rest{background:rgba(107,107,107,0.13);color:var(--muted);}
    /* done dot */
    .done-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:3px;}
    .done-dot-golf{background:var(--lime);}
    .done-dot-run{background:var(--sky);}
    .done-dot-swim{background:var(--aqua);}
    .done-dot-tennis{background:var(--amber);}
    .done-dot-bike{background:var(--green);}
    /* changed chip on card */
    .card-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
    .card-chip-golf{background:rgba(163,230,53,0.18);color:var(--lime);}
    .card-chip-run{background:rgba(56,189,248,0.18);color:var(--sky);}
    .card-chip-swim{background:rgba(34,211,238,0.18);color:var(--aqua);}
    .card-chip-tennis{background:rgba(251,191,36,0.18);color:var(--amber);}
    .card-chip-bike{background:rgba(74,222,128,0.18);color:var(--green);}
    .alt-note{margin-top:12px;padding-top:10px;border-top:1px dashed rgba(163,230,53,0.1);font-size:11px;color:var(--subtext);display:flex;align-items:center;gap:5px;}
    .alt-note::before{content:'↻';color:var(--lime-dim);font-size:12px;}

    /* Summary */
    .summary{max-width:860px;margin:36px auto 0;background:var(--surface);border:1px solid rgba(163,230,53,0.08);border-radius:14px;padding:20px 24px;display:flex;flex-wrap:wrap;gap:20px;align-items:center;}
    .summary-label{font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--lime);margin-bottom:4px;}
    .summary-stat{flex:1;min-width:80px;text-align:center;}
    .summary-num{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:#fff;}
    .summary-desc{font-size:12px;color:var(--subtext);margin-top:2px;}
    .summary-divider{width:1px;height:40px;background:rgba(163,230,53,0.1);}
    .swipe-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:24px;max-width:860px;margin-left:auto;margin-right:auto;}

    /* ═══ MODAL ═══ */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:#1A2B1A;border:1px solid rgba(163,230,53,0.15);border-radius:18px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:28px 24px 24px;position:relative;animation:modalIn 0.2s ease;}
    @keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(0.97);}to{opacity:1;transform:none;}}
    .modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--subtext);font-size:20px;cursor:pointer;line-height:1;}
    .modal-close:hover{color:var(--text);}

    /* modal header */
    .modal-head{margin-bottom:16px;}
    .modal-dayname{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;}
    .modal-date-txt{font-size:12px;color:var(--subtext);margin-top:2px;}

    /* tabs */
    .modal-tabs{display:flex;gap:6px;margin-top:14px;margin-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:0;}
    .modal-tab{padding:6px 14px;border-radius:10px 10px 0 0;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;background:transparent;color:var(--subtext);transition:all 0.15s;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .tab-icon{font-size:18px;line-height:1;}
    .modal-tab:hover{color:var(--text);}
    .modal-tab[draggable="true"]{cursor:grab;}
    .modal-tab[draggable="true"]:active{cursor:grabbing;}
    .modal-tab.tab-dragging{opacity:1;background:rgba(255,255,255,0.55);color:#1A2B1A;border-radius:10px 10px 0 0;font-weight:800;backdrop-filter:blur(4px);}
    .modal-tab.tab-drag-over{background:rgba(163,230,53,0.25);border-radius:10px 10px 0 0;color:var(--lime);outline:2px dashed rgba(163,230,53,0.7);}
    .modal-tab:hover{color:var(--text);}
    .modal-tab.active-golf{color:var(--lime);border-bottom-color:var(--lime);}
    .modal-tab.active-run{color:var(--sky);border-bottom-color:var(--sky);}
    .modal-tab.active-swim{color:var(--aqua);border-bottom-color:var(--aqua);}
    .modal-tab.active-tennis{color:var(--amber);border-bottom-color:var(--amber);}
    .modal-tab.active-bike{color:var(--green);border-bottom-color:var(--green);}
    .modal-tab-rest{color:var(--muted) !important;cursor:default;}
    .tab-remove{position:absolute;top:-8px;right:-4px;width:16px;height:16px;border-radius:50%;background:rgba(100,100,100,0.4);color:rgba(255,255,255,0.7);font-size:10px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;}
    .tab-remove:hover{background:var(--rose);color:#fff;}
    .tab-add-btn{color:var(--subtext);border-color:transparent;font-size:12px;opacity:0.7;}
    .tab-add-btn:hover{opacity:1;color:var(--lime);background:rgba(163,230,53,0.08);}

    /* tab pane */
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}

    /* section */
    .m-section{background:rgba(255,255,255,0.03);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
    .m-section-label{font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
    .golf-pane .m-section-label{color:var(--lime);}
    .run-pane  .m-section-label{color:var(--sky);}

    /* plan name row */
    .plan-name-row{display:flex;align-items:center;gap:8px;}
    .plan-name-val{font-size:14px;font-weight:500;color:var(--text);flex:1;}
    .plan-name-edit{background:none;border:none;color:var(--subtext);font-size:13px;cursor:pointer;padding:0 2px;transition:color 0.15s;}
    .plan-name-edit:hover{color:var(--lime);}
    .plan-name-input{flex:1;background:transparent;border:none;border-bottom:1px solid rgba(163,230,53,0.4);color:var(--text);font-size:14px;padding:2px 0;outline:none;font-family:'Noto Sans KR',sans-serif;}
    .plan-name-save{background:var(--lime);color:var(--bg);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .plan-name-cancel{background:rgba(255,255,255,0.07);color:var(--subtext);border:none;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

    /* changed chips */
    .changed-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:24px;}
    .changed-chip{display:flex;align-items:center;gap:5px;padding:5px 10px 5px 12px;border-radius:20px;font-size:13px;font-weight:600;animation:chipIn 0.15s ease;}
    @keyframes chipIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:none;}}
    .changed-chip-golf{background:rgba(163,230,53,0.12);color:var(--lime);border:1px solid rgba(163,230,53,0.3);}
    .changed-chip-run{background:rgba(56,189,248,0.12);color:var(--sky);border:1px solid rgba(56,189,248,0.3);}
    .changed-chip-swim{background:rgba(34,211,238,0.12);color:var(--aqua);border:1px solid rgba(34,211,238,0.3);}
    .changed-chip-tennis{background:rgba(251,191,36,0.12);color:var(--amber);border:1px solid rgba(251,191,36,0.3);}
    .changed-chip-bike{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.3);}
    .chip-x{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;color:inherit;opacity:0.6;padding:0;}
    .chip-x:hover{opacity:1;}
    .no-changed{font-size:12px;color:var(--muted);font-style:italic;}
    .add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.13);color:var(--subtext);transition:all 0.15s;margin-top:2px;}
    .golf-pane .add-btn:hover{background:rgba(163,230,53,0.08);border-color:rgba(163,230,53,0.3);color:var(--lime);}
    .run-pane  .add-btn:hover{background:rgba(56,189,248,0.08);border-color:rgba(56,189,248,0.3);color:var(--sky);}

    /* done check */
    .done-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:2px dashed;transition:all 0.18s;}
    .done-btn-golf{border-color:rgba(163,230,53,0.3);color:var(--subtext);background:transparent;}
    .done-btn-golf:hover{border-color:rgba(163,230,53,0.6);background:rgba(163,230,53,0.07);color:var(--lime);}
    .done-btn-golf.done{border-style:solid;border-color:var(--lime);background:rgba(163,230,53,0.15);color:var(--lime);}
    .done-btn-run{border-color:rgba(56,189,248,0.3);color:var(--subtext);background:transparent;}
    .done-btn-run:hover{border-color:rgba(56,189,248,0.6);background:rgba(56,189,248,0.07);color:var(--sky);}
    .done-btn-run.done{border-style:solid;border-color:var(--sky);background:rgba(56,189,248,0.15);color:var(--sky);}
    .done-btn-swim{border-color:rgba(34,211,238,0.3);color:var(--subtext);background:transparent;}
    .done-btn-swim:hover{border-color:rgba(34,211,238,0.6);background:rgba(34,211,238,0.07);color:var(--aqua);}
    .done-btn-swim.done{border-style:solid;border-color:var(--aqua);background:rgba(34,211,238,0.15);color:var(--aqua);}
    .done-btn-tennis{border-color:rgba(251,191,36,0.3);color:var(--subtext);background:transparent;}
    .done-btn-tennis:hover{border-color:rgba(251,191,36,0.6);background:rgba(251,191,36,0.07);color:var(--amber);}
    .done-btn-tennis.done{border-style:solid;border-color:var(--amber);background:rgba(251,191,36,0.15);color:var(--amber);}
    .done-btn-bike{border-color:rgba(74,222,128,0.3);color:var(--subtext);background:transparent;}
    .done-btn-bike:hover{border-color:rgba(74,222,128,0.6);background:rgba(74,222,128,0.07);color:var(--green);}
    .done-btn-bike.done{border-style:solid;border-color:var(--green);background:rgba(74,222,128,0.15);color:var(--green);}

    /* note */
    .modal-divider{height:1px;background:rgba(255,255,255,0.07);margin:14px 0;}
    .note-view{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.8;color:var(--text);min-height:60px;white-space:pre-wrap;word-break:break-word;}
    .note-empty{color:var(--muted);font-style:italic;}
    .note-ta{width:100%;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.8;color:var(--text);font-family:'Noto Sans KR',sans-serif;resize:vertical;min-height:200px;outline:none;border:1px solid rgba(163,230,53,0.25);}
    .note-ta:focus{border-color:var(--lime);}
    .note-ta::placeholder{color:var(--muted);}
    .memo-del-confirm{display:flex;align-items:center;gap:6px;}
    .memo-del-txt{font-size:12px;color:var(--rose);}
    .memo-del-wrap{display:flex;align-items:center;}

    /* 사진 섹션 */
    .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
    .photo-add-row{margin-bottom:4px;}
    .photo-thumb{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;flex-shrink:0;}
    .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .photo-thumb-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;line-height:1;}
    .photo-thumb-del:hover{background:var(--rose);}
    .photo-thumb-view{position:absolute;inset:0;cursor:pointer;}
    .photo-add-btn{width:80px;height:80px;border-radius:8px;border:1px dashed rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--subtext);font-size:11px;transition:all 0.15s;flex-shrink:0;}
    .photo-add-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.35);}
    .photo-add-icon{font-size:20px;}
    .photo-add-cam{background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;color:var(--subtext);transition:all 0.15s;display:flex;align-items:center;gap:4px;font-family:'Noto Sans KR',sans-serif;}
    .photo-add-cam:hover{background:rgba(255,255,255,0.09);}
    .photo-drive-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--subtext);border-radius:8px;padding:4px 8px;font-size:12px;cursor:pointer;transition:background 0.15s;}
    .photo-drive-btn:hover{background:rgba(163,230,53,0.12);color:var(--lime);}
    /* 공유 버튼 */
    .photo-share-start-btn{background:rgba(163,230,53,0.1);border:1px solid rgba(163,230,53,0.25);color:var(--lime);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;}
    .photo-share-start-btn:hover{background:rgba(163,230,53,0.2);}
    /* 선택 모드 툴바 */
    .photo-select-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .photo-sel-all-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:14px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .photo-sel-count{font-size:12px;color:var(--subtext);flex:1;}
    .photo-sel-share-btn{background:var(--lime);color:var(--bg);border:none;border-radius:14px;padding:4px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .photo-sel-cancel-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--subtext);border-radius:14px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    /* 선택 체크 오버레이 */
    .photo-thumb-check{display:none;position:absolute;inset:0;cursor:pointer;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);}
    .photo-thumb.select-mode .photo-thumb-check{display:flex;}
    .photo-thumb.select-mode .photo-thumb-view{display:none;}
    .photo-thumb.select-mode .photo-thumb-del{display:none;}
    .photo-check-icon{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(0,0,0,0.3);color:transparent;}
    .photo-thumb.selected .photo-thumb-check{background:rgba(0,0,0,0.45);}
    .photo-thumb.selected .photo-check-icon{background:var(--lime);border-color:var(--lime);color:var(--bg);font-weight:900;}
    .photo-thumb.selected::after{content:'';position:absolute;inset:0;border:3px solid var(--lime);border-radius:8px;pointer-events:none;}
    /* 사진 전체보기 */
    .photo-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
    .photo-viewer.open{display:flex;}
    .photo-viewer img{max-width:90vw;max-height:80vh;border-radius:10px;object-fit:contain;}
    .photo-viewer-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;}
    .photo-viewer-nav{display:flex;gap:16px;align-items:center;}
    .photo-viewer-btn{background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:40px;height:40px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .photo-viewer-btn:hover{background:rgba(255,255,255,0.3);}
    .photo-viewer-count{color:rgba(255,255,255,0.6);font-size:13px;}
    /* 토스트 */
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E2E1E;border:1px solid rgba(163,230,53,0.3);color:var(--text);border-radius:20px;padding:10px 20px;font-size:13px;z-index:600;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
    .btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border:none;transition:opacity 0.15s;}
    .btn:hover{opacity:0.82;}
    .btn-lime{background:var(--lime);color:var(--bg);}
    .btn-sky{background:var(--sky);color:var(--bg);}
    .btn-aqua{background:var(--aqua);color:var(--bg);}
    .btn-amber{background:var(--amber);color:var(--bg);}
    .btn-green{background:var(--green);color:var(--bg);}
    .btn-ghost{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid rgba(255,255,255,0.1);}
    .btn-danger{background:rgba(251,113,133,0.15);color:var(--rose);border:1px solid rgba(251,113,133,0.2);}

    /* ═══ CALENDAR PICKER ═══ */
    .calpicker-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);align-items:center;justify-content:center;}
    .calpicker-overlay.open{display:flex;}
    .calpicker{background:#1A2B1A;border:1px solid rgba(163,230,53,0.2);border-radius:16px;padding:20px;width:min(340px,92vw);animation:modalIn 0.18s ease;}
    .calpicker-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .calpicker-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer;padding:4px 10px;border-radius:8px;transition:background 0.15s;user-select:none;}
    .calpicker-title:hover{background:rgba(163,230,53,0.1);}
    .calpicker-nav{background:none;border:none;color:var(--lime);font-size:20px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
    .calpicker-nav:hover{background:rgba(163,230,53,0.1);}
    .calpicker-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
    .calpicker-dow{text-align:center;font-size:11px;font-weight:700;color:var(--subtext);padding:4px 0;}
    .calpicker-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;height:calc(6*36px);}
    .cal-v-outer{overflow:hidden;width:100%;height:calc(6*36px);}
    .cal-v-track{display:flex;flex-direction:column;height:300%;transition:transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94);will-change:transform;}
    .cal-v-slide{height:33.333%;flex-shrink:0;}
    .cal-track-outer{display:none;}
    .cal-track{display:none;}
    .calpicker-day{text-align:center;font-size:13px;border-radius:8px;cursor:pointer;color:var(--text);transition:background 0.12s;line-height:1.2;display:flex;align-items:center;justify-content:center;}
    .calpicker-day.other-month{color:var(--muted);opacity:0.4;}
    .calpicker-day.today{background:var(--lime);color:var(--bg) !important;font-weight:700;border-radius:50%;}
    .calpicker-day.holiday{color:#FF6B6B;}
    .calpicker-day.holiday.today{background:var(--lime);color:var(--bg) !important;}
    .calpicker-day.selected-week{background:rgba(255,255,255,0.1);color:var(--text);}
    .calpicker-day.selected-week.today{background:var(--lime);color:var(--bg) !important;}
    .calpicker-day.week-start{border-radius:8px 0 0 8px;}
    .calpicker-day.week-end{border-radius:0 8px 8px 0;}
    .calpicker-day.week-start.week-end{border-radius:8px;}
    .calpicker-day.today.week-start,.calpicker-day.today.week-end,.calpicker-day.today.week-start.week-end{border-radius:50%;}
    /* 드럼 피커 */
    .drum-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(13,24,16,0.97);border-radius:16px;z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:0;}
    .drum-overlay.open{display:flex;}
    .drum-cols{display:flex;gap:16px;align-items:flex-start;justify-content:center;}
    .drum-col{display:flex;flex-direction:column;align-items:center;width:100px;}
    .drum-label{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--subtext);margin-bottom:28px;margin-top:-8px;}
    .drum-item{height:36px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:18px;font-weight:600;color:var(--subtext);cursor:pointer;border-radius:8px;transition:color 0.15s,font-size 0.15s;}
    .drum-item:hover{color:var(--text);}
    .drum-item.active{color:#fff;font-size:22px;font-weight:700;}
    .drum-scroll{height:180px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;position:relative;width:100%;margin-top:-12px;-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 28%,black 72%,transparent 100%);mask-image:linear-gradient(to bottom,transparent 0%,black 28%,black 72%,transparent 100%);}
    .drum-scroll::-webkit-scrollbar{display:none;}
    .drum-done{background:var(--lime);color:var(--bg);border:none;border-radius:20px;padding:8px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:400;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
    .search-overlay.open{display:flex;}
    .search-panel{background:#141F14;border:1px solid rgba(163,230,53,0.2);border-radius:18px;width:100%;max-width:600px;padding:24px;margin:auto;animation:modalIn 0.2s ease;}
    .search-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .search-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;flex:1;}
    .search-close{background:none;border:none;color:var(--subtext);font-size:20px;cursor:pointer;}
    .search-close:hover{color:var(--text);}
    .search-input-wrap{position:relative;margin-bottom:16px;}
    .search-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(163,230,53,0.25);border-radius:10px;padding:12px 40px 12px 16px;font-size:15px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s;}
    .search-input:focus{border-color:var(--lime);}
    .search-input::placeholder{color:var(--muted);}
    .search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--subtext);font-size:16px;cursor:pointer;display:none;}
    .search-clear.visible{display:block;}
    .search-results{display:flex;flex-direction:column;gap:10px;}
    .search-empty{text-align:center;color:var(--subtext);font-size:14px;padding:32px 0;}
    .search-result-card{background:var(--card);border:1px solid rgba(163,230,53,0.08);border-radius:12px;padding:14px 16px;cursor:pointer;transition:background 0.15s,border-color 0.15s;}
    .search-result-card:hover{background:var(--card-hover);border-color:rgba(163,230,53,0.2);}
    .search-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .search-result-date{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--lime);}
    .search-result-type{font-size:13px;font-weight:700;padding:4px 12px;border-radius:10px;}
    .search-result-memo{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .search-result-memo mark{background:rgba(163,230,53,0.3);color:var(--lime);border-radius:3px;padding:0 2px;}
    .search-count{font-size:12px;color:var(--subtext);margin-bottom:12px;}
    .search-copy-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer;transition:all 0.15s;color:var(--subtext);}
    .search-copy-btn:hover{background:rgba(255,255,255,0.14);color:var(--text);}
    .settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:400;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
    .settings-overlay.open{display:flex;}
    .settings-panel{background:#141F14;border:1px solid rgba(163,230,53,0.2);border-radius:18px;width:100%;max-width:700px;padding:28px 24px 32px;margin:auto;animation:modalIn 0.2s ease;position:relative;}
    .settings-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .settings-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;}
    .settings-close{background:none;border:none;color:var(--subtext);font-size:20px;cursor:pointer;}
    .settings-close:hover{color:var(--text);}
    .settings-section{margin-bottom:28px;}
    .settings-section-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--lime);margin-bottom:12px;}
    /* cycle buttons */
    .cycle-btns{display:flex;gap:8px;}
    .cycle-btn{padding:8px 24px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid rgba(163,230,53,0.2);background:rgba(255,255,255,0.04);color:var(--subtext);font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
    .cycle-btn:hover{border-color:rgba(163,230,53,0.4);color:var(--text);}
    .cycle-btn.active{background:rgba(163,230,53,0.15);border-color:var(--lime);color:var(--lime);}
    /* routine table */
    .rt-scroll{overflow-x:auto;}
    .rt-table{border-collapse:collapse;width:100%;min-width:360px;}
    .rt-day-head{width:32px;}
    .rt-week-head{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--subtext);text-align:center;padding:6px 4px;}
    .rt-day-cell{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--subtext);text-align:center;padding:6px 4px;vertical-align:top;}
    .rt-cell{padding:4px;vertical-align:top;}
    .rt-row-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;border-radius:6px;padding:2px 4px;transition:background 0.12s;}
    .rt-row-item:last-child{margin-bottom:0;}
    .rt-active{cursor:grab;}
    .rt-active:hover{background:rgba(255,255,255,0.05);}
    .rt-inactive{opacity:0.28;cursor:default;}
    .rt-row-item.dragging{opacity:1;background:rgba(255,255,255,0.55);border-radius:6px;}
    .rt-row-item.drag-over{background:rgba(163,230,53,0.18);border-radius:6px;outline:2px dashed rgba(163,230,53,0.6);}
    .rt-section-divider{height:1px;background:rgba(255,255,255,0.1);margin:4px 0;}
    .rt-inactive-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
    .rt-inactive-btn{background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.15);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.45;transition:all 0.15s;}
    .rt-inactive-btn:hover{opacity:1;background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.35);}
    .rt-drag-handle{font-size:12px;color:var(--muted);cursor:grab;flex-shrink:0;user-select:none;}
    .rt-drag-handle:active{cursor:grabbing;}
    .rt-type-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .rt-type-btn:hover{background:rgba(255,255,255,0.1);}
    .rt-type-btn.sel-golf{background:rgba(163,230,53,0.18);border-color:rgba(163,230,53,0.5);}
    .rt-type-btn.sel-run{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.5);}
    .rt-type-btn.sel-swim{background:rgba(34,211,238,0.18);border-color:rgba(34,211,238,0.5);}
    .rt-type-btn.sel-tennis{background:rgba(251,191,36,0.18);border-color:rgba(251,191,36,0.5);}
    .rt-type-btn.sel-bike{background:rgba(74,222,128,0.18);border-color:rgba(74,222,128,0.5);}
    .rt-name-input{width:120px;min-width:0;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 7px;font-size:12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;}
    .rt-name-input:focus{border-color:rgba(163,230,53,0.4);}
    .rt-name-input.rt-input-disabled,.rt-name-input:disabled{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.05);color:var(--muted);cursor:default;}
    /* footer */
    .settings-footer{display:flex;align-items:center;justify-content:center;margin-top:8px;gap:12px;flex-wrap:nowrap;}
    .settings-footer-left{display:flex;gap:6px;flex:1;}
    .settings-save-default{background:none;border:1px solid rgba(163,230,53,0.3);color:var(--lime);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;white-space:nowrap;}
    .settings-save-default:hover{background:rgba(163,230,53,0.08);}
    .settings-reset{background:none;border:1px solid rgba(251,113,133,0.2);color:var(--rose);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
    .settings-reset:hover{background:rgba(251,113,133,0.08);}
    .settings-save{background:var(--lime);color:var(--bg);border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
    .settings-save:hover{opacity:0.88;}
    /* 확인 팝업 */
    .confirm-popup{position:absolute;bottom:80px;left:0;right:0;padding:0 24px;}
    .confirm-popup-inner{background:#1E2E1E;border:1px solid rgba(163,230,53,0.3);border-radius:12px;padding:16px 18px;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
    .confirm-popup-txt{font-size:14px;color:var(--text);margin-bottom:12px;line-height:1.5;}
    .confirm-popup-sub{font-size:12px;color:var(--subtext);}
    .confirm-popup-btns{display:flex;gap:8px;justify-content:flex-end;}
    .confirm-yes{background:var(--lime);color:var(--bg);border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .confirm-no{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .picker-backdrop{display:none;position:fixed;inset:0;z-index:300;background:transparent;}
    .picker-backdrop.open{display:block;}

  </style>
  <!-- Google Drive API (리디렉션 방식 — 팝업 없음) -->
  <script>
  const GD_CLIENT_ID  = '1066596069648-1l0tl9n9g20ch87f065f0l6f870ng3tb.apps.googleusercontent.com';
  const GD_SCOPE      = 'https://www.googleapis.com/auth/drive.appdata';
  const GD_DATA_FILE  = 'workout-data.json';
  const GD_SYNC_TS    = 'gd_last_sync_ts';
  const GD_TOKEN_KEY  = 'gd_token';
  const GD_TOKEN_EXP  = 'gd_token_exp';
  const GD_LOGIN_HINT = 'gd_login_hint';
  const GD_REDIRECT = 'https://double-hee.github.io/weekly-workout/';
  const SYNC_KEYS = [
    'workout_notes_v4','workout_actual_v4','workout_custom_v4',
    'workout_plan_name_v6','workout_done_v4','workout_extra_v5',
    'workout_removed_v1','workout_tab_order_v1','workout_routine_v2',
    'workout_routine_history_v1','workout_user_default_v1'
  ];

  let gdToken = null;
  let gdDirty = false;
  let gdSaveTimer = null;
  let gdSyncing = false;
  const _lsSet = localStorage.setItem.bind(localStorage);

  // ── 토큰 복원 ──
  function gdRestoreToken() {
    const token = localStorage.getItem(GD_TOKEN_KEY);
    const exp   = parseInt(localStorage.getItem(GD_TOKEN_EXP)||'0');
    if(token && Date.now() < exp - 60000) { gdToken = token; return true; }
    return false;
  }

  // ── 토큰 저장 ──
  function gdSaveToken(token, expiresIn) {
    gdToken = token;
    const exp = Date.now() + (expiresIn||3600)*1000;
    _lsSet(GD_TOKEN_KEY, token);
    _lsSet(GD_TOKEN_EXP, String(exp));
    // 만료 5분 전 자동 재로그인
    setTimeout(gdRefreshToken, (expiresIn||3600)*1000 - 300000);
  }

  // ── 조용한 토큰 갱신 (페이지 이동 없이) ──
  function gdRefreshToken() {
    const hint = localStorage.getItem(GD_LOGIN_HINT);
    if(!hint) return;
    // iframe으로 조용히 갱신 시도
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = `https://accounts.google.com/o/oauth2/v2/auth`
      + `?client_id=${GD_CLIENT_ID}`
      + `&redirect_uri=${encodeURIComponent(GD_REDIRECT)}`
      + `&response_type=token`
      + `&scope=${encodeURIComponent(GD_SCOPE)}`
      + `&login_hint=${encodeURIComponent(hint)}`
      + `&prompt=none`;
    document.body.appendChild(iframe);
    // 10초 후 iframe 제거
    setTimeout(() => iframe.remove(), 10000);
  }

  // ── OAuth 로그인 (리디렉션) ──
  function gdLogin(cb) {
    if(cb) sessionStorage.setItem('gd_cb', cb.name||'sync');
    const hint = localStorage.getItem(GD_LOGIN_HINT)||'';
    const url = `https://accounts.google.com/o/oauth2/v2/auth`
      + `?client_id=${GD_CLIENT_ID}`
      + `&redirect_uri=${encodeURIComponent(GD_REDIRECT)}`
      + `&response_type=token`
      + `&scope=${encodeURIComponent(GD_SCOPE)}`
      + (hint ? `&login_hint=${encodeURIComponent(hint)}` : '')
      + `&prompt=consent`;
    // PWA standalone 모드에서도 작동하도록
    window.location.href = url;
  }

  // ── OAuth 콜백 처리 (URL 해시) ──
  function gdHandleCallback() {
    const hash = location.hash.substring(1);
    if(!hash.includes('access_token')) return false;
    const params = Object.fromEntries(hash.split('&').map(p=>p.split('=')));
    if(!params.access_token) return false;
    gdSaveToken(decodeURIComponent(params.access_token), parseInt(params.expires_in||3600));
    history.replaceState(null,'', location.pathname);
    return true;
  }

  // ── 상태 아이콘 ──
  let gdStatusTimer = null;
  function gdSetStatus(s) {
    const icon = document.getElementById('gdStatusIcon');
    const text = document.getElementById('gdStatusText');
    if(!icon) return;
    clearTimeout(gdStatusTimer);
    const map = {syncing:['🔄','gd-spin','동기화 중...'],ok:['✅','','동기화 완료'],error:['❌','','동기화 실패'],idle:['☁️','','Drive 동기화']};
    const [ic,cls,tx] = map[s]||map.idle;
    icon.textContent=ic; icon.className=cls; text.textContent=tx;
    if(s==='ok')    gdStatusTimer = setTimeout(()=>gdSetStatus('idle'), 3000);
    if(s==='error') gdStatusTimer = setTimeout(()=>gdSetStatus('idle'), 5000);
  }

  // ── Drive API 헬퍼 ──
  async function gdFetch(path, opts={}) {
    return fetch('https://www.googleapis.com/'+path, {
      ...opts, keepalive:true,
      headers:{Authorization:'Bearer '+gdToken,...(opts.headers||{})}
    });
  }
  async function gdFindFile(name) {
    const r = await gdFetch(`drive/v3/files?spaces=appDataFolder&q=name='${name}'&fields=files(id,modifiedTime)`);
    const d = await r.json();
    return d.files&&d.files[0] ? d.files[0] : null;
  }
  async function gdWriteFile(name, jsonStr) {
    const existing = await gdFindFile(name);
    if(existing) return gdFetch(`upload/drive/v3/files/${existing.id}?uploadType=media`,
      {method:'PATCH',headers:{'Content-Type':'application/json'},body:jsonStr});
    const meta = JSON.stringify({name,parents:['appDataFolder']});
    const b = '--gdbound';
    const body = `\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${jsonStr}\r\n--${b}--`;
    return gdFetch('upload/drive/v3/files?uploadType=multipart',
      {method:'POST',headers:{'Content-Type':`multipart/related; boundary="${b}"`},body});
  }

  // ── XHR (진행률) ──
  function xhrReq(method, url, headers, body) {
    return new Promise((res,rej) => {
      const xhr = new XMLHttpRequest();
      xhr.open(method, url);
      Object.entries(headers).forEach(([k,v])=>xhr.setRequestHeader(k,v));
      xhr.responseType = 'text';
      if(method==='GET') xhr.onprogress = e=>{if(e.lengthComputable)setProgress(e.loaded/e.total*100);};
      else if(xhr.upload) xhr.upload.onprogress = e=>{if(e.lengthComputable)setProgress(e.loaded/e.total*100);};
      xhr.onload = ()=>res({ok:xhr.status>=200&&xhr.status<300,status:xhr.status,text:xhr.responseText});
      xhr.onerror = ()=>rej(new Error('Network error'));
      xhr.send(body||null);
    });
  }

  // ── 자동 동기화 ──
  async function gdSyncDown() {
    if(!gdToken||gdSyncing) return;
    gdSyncing=true; gdSetStatus('syncing');
    try {
      const file = await gdFindFile(GD_DATA_FILE);
      if(!file){gdSetStatus('ok');gdSyncing=false;return;}
      const r = await gdFetch(`drive/v3/files/${file.id}?alt=media`);
      if(!r.ok){gdSetStatus('error');gdSyncing=false;return;}
      const data = await r.json();
      Object.entries(data).forEach(([k,v])=>_lsSet(k,v));
      _lsSet(GD_SYNC_TS, String(Date.now()));
      gdSetStatus('ok');
      if(window.renderSlides) window.renderSlides();
    } catch(e){gdSetStatus('error');}
    gdSyncing=false;
  }
  async function gdSyncUp() {
    if(!gdToken||!gdDirty||gdSyncing) return;
    gdDirty=false; gdSyncing=true; gdSetStatus('syncing');
    try {
      const payload={};
      SYNC_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v)payload[k]=v;});
      await gdWriteFile(GD_DATA_FILE, JSON.stringify(payload));
      _lsSet(GD_SYNC_TS, String(Date.now()));
      gdSetStatus('ok');
    } catch(e){gdDirty=true;gdSetStatus('error');}
    gdSyncing=false;
  }

  // ── localStorage dirty 감지 ──
  localStorage.setItem = function(k,v) {
    _lsSet(k,v);
    if(gdToken && SYNC_KEYS.includes(k)) {
      gdDirty=true;
      clearTimeout(gdSaveTimer);
      gdSaveTimer = setTimeout(gdSyncUp, 5000);
    }
  };

  // ── 페이지 닫힘 시 keepalive 업로드 ──
  function gdSyncUpSync() {
    if(!gdToken) return;
    gdDirty=false;
    try {
      const payload={};
      SYNC_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v)payload[k]=v;});
      const jsonStr=JSON.stringify(payload);
      gdFindFile(GD_DATA_FILE).then(existing=>{
        if(existing) fetch(`https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=media`,
          {method:'PATCH',keepalive:true,headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},body:jsonStr});
        else {
          const meta=JSON.stringify({name:GD_DATA_FILE,parents:['appDataFolder']});
          const b='--gdbound';
          const body=`\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${jsonStr}\r\n--${b}--`;
          fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
            {method:'POST',keepalive:true,headers:{Authorization:'Bearer '+gdToken,'Content-Type':`multipart/related; boundary="${b}"`},body});
        }
        _lsSet(GD_SYNC_TS, String(Date.now()));
      });
    } catch(e){gdDirty=true;}
  }
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')gdSyncUpSync();});
  window.addEventListener('pagehide', gdSyncUpSync);

  // ── 사진 업로드/다운로드 ──
  async function gdUploadAllPhotos() {
    if(!gdToken){gdLogin(gdUploadAllPhotos);return;}
    if(gdDirty){showLoading('운동 목록 동기화 중...');await gdSyncUp();}
    showLoading('사진 수집 중...');
    try {
      const db=await new Promise((res,rej)=>{const r=indexedDB.open('workout_photos_db',1);r.onsuccess=e=>res(e.target.result);r.onerror=rej;});
      const all=await new Promise((res,rej)=>{const tx=db.transaction('photos','readonly');const st=tx.objectStore('photos');const result={};const cr=st.openCursor();cr.onsuccess=e=>{const cursor=e.target.result;if(cursor){result[cursor.key]=cursor.value;cursor.continue();}else res(result);};cr.onerror=rej;});
      const keys=Object.keys(all);
      if(!keys.length){hideLoading();showBigToast('⚠️ 저장된 사진이 없어요.');return;}
      showLoading(`사진 업로드 중... (${keys.length}개)`,true);
      const jsonStr=JSON.stringify(all);
      const existing=await gdFindFile('workout-photos-all.json');
      let r;
      if(existing) r=await xhrReq('PATCH',`https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=media`,{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},jsonStr);
      else {
        const meta=JSON.stringify({name:'workout-photos-all.json',parents:['appDataFolder']});
        const b='--gdbound';
        const body=`\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${jsonStr}\r\n--${b}--`;
        r=await xhrReq('POST','https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{Authorization:'Bearer '+gdToken,'Content-Type':`multipart/related; boundary="${b}"`},body);
      }
      hideLoading();
      if(r.ok) showBigToast(`✅ 사진 ${keys.length}개 업로드 완료!`);
      else showBigToast('❌ 업로드 실패: '+r.status);
    } catch(e){hideLoading();showBigToast('❌ 오류: '+e.message);}
  }
  async function gdDownloadAllPhotos() {
    if(!gdToken){gdLogin(gdDownloadAllPhotos);return;}
    showLoading('Drive 확인 중...');
    try {
      const file=await gdFindFile('workout-photos-all.json');
      if(!file){hideLoading();showBigToast('⚠️ Drive에 저장된 사진이 없어요.');return;}
      showLoading('사진 다운로드 중...',true);
      const r=await xhrReq('GET',`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,{Authorization:'Bearer '+gdToken});
      if(!r.ok){hideLoading();showBigToast('❌ 다운로드 실패: '+r.status);return;}
      showLoading('사진 저장 중...');
      const all=JSON.parse(r.text);
      const db=await new Promise((res,rej)=>{const req=indexedDB.open('workout_photos_db',1);req.onsuccess=e=>res(e.target.result);req.onerror=rej;});
      await new Promise((res,rej)=>{const tx=db.transaction('photos','readwrite');const st=tx.objectStore('photos');Object.entries(all).forEach(([k,v])=>st.put(v,k));tx.oncomplete=res;tx.onerror=rej;});
      hideLoading();
      showBigToast(`✅ 사진 ${Object.keys(all).length}개 다운로드 완료!`);
    } catch(e){hideLoading();showBigToast('❌ 오류: '+e.message);}
  }

  // ── UI 헬퍼 ──
  function showLoading(msg,showProg=false){document.getElementById('loadingMsg').textContent=msg;document.getElementById('loadingOverlay').classList.add('open');document.getElementById('loadingSpinner').style.display=showProg?'none':'block';document.getElementById('progressWrap').classList.toggle('show',showProg);if(showProg)setProgress(0);}
  function hideLoading(){document.getElementById('loadingOverlay').classList.remove('open');}
  function setProgress(pct){const offset=2*Math.PI*35*(1-pct/100);document.getElementById('progressBar').style.strokeDashoffset=offset;document.getElementById('progressPct').textContent=Math.round(pct)+'%';}
  function showBigToast(msg){const el=document.getElementById('toastBig');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3500);}

  // window exports
  window.gdLogin=gdLogin;
  window.gdSyncDown=gdSyncDown;

  // 업로드 후 다운로드 (동기화 재실행용)
  async function gdSyncUpThenDown() {
    gdDirty = true;
    await gdSyncUp();   // 먼저 업로드
    await gdSyncDown(); // 그 다음 다운로드
  }
  window.gdSyncUpThenDown = gdSyncUpThenDown;
  window.gdUploadAllPhotos=gdUploadAllPhotos;
  window.gdDownloadAllPhotos=gdDownloadAllPhotos;
  window.gdSetStatus=gdSetStatus;
  window.showLoading=showLoading;
  window.hideLoading=hideLoading;
  window.setProgress=setProgress;
  window.showBigToast=showBigToast;
  Object.defineProperty(window,'gdToken',{get:()=>gdToken});

  // ── 페이지 로드 ──
  window.addEventListener('DOMContentLoaded',()=>{
    // OAuth 리디렉션 후 토큰 처리
    if(location.hash.includes('access_token')){
      gdHandleCallback();
      const btn=document.getElementById('gdLoginBtn');
      if(btn){btn.textContent='🔄 동기화 재실행';btn.onclick=()=>{document.getElementById('gdOverlay').classList.remove('open');gdDirty=true;gdSyncUp();};}
      document.getElementById('gdOverlay').classList.remove('open');
      gdSyncDown();
      return;
    }
    // 저장된 토큰으로 복원
    if(gdRestoreToken()){
      const btn=document.getElementById('gdLoginBtn');
      if(btn){btn.textContent='🔄 동기화 재실행';btn.onclick=()=>{document.getElementById('gdOverlay').classList.remove('open');gdDirty=true;gdSyncUp();};}
      // 처음 열릴 때: 다운로드만 / 새로고침: 업로드만
      const navType = performance.getEntriesByType('navigation')[0]?.type
        || (performance.navigation?.type === 1 ? 'reload' : 'navigate');
      if(navType === 'reload') { gdDirty=true; gdSyncUp(); }
      else gdSyncDown();
      return;
    }
    // 토큰 없으면 로그인 팝업
    setTimeout(()=>document.getElementById('gdOverlay').classList.add('open'),300);
  });
  </script>

<div class="loading-overlay" id="loadingOverlay">

/* ══ 사진 압축 ══ */
function compressImage(dataUrl){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1920; // 모바일 고화질 기준
      let w=img.width, h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      try{
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',0.85));
      }catch(e){rej(e);}
    };
    img.onerror=rej;
    img.src=dataUrl;
  });
}

/* ══ INDEXEDDB (사진 저장) ══ */
const IDB_NAME='workout_photos_db', IDB_STORE='photos', IDB_VER=1;

function openIDB(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,IDB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=e=>rej(e);
  });
}

function getWeekStart(d){const r=new Date(d);r.setHours(0,0,0,0);r.setDate(r.getDate()-r.getDay());return r;}
function getWeekNum(d){const s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);}
function weekOffset(ws){return Math.round((ws-getWeekStart(CYCLE_ANCHOR))/(7*86400000));}
function fmt(d){return`${d.getMonth()+1}/${d.getDate()}`;}

function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getRoutine(){
  const stored=load(ROUTINE_KEY);
  if(stored&&stored.cycle&&stored.weeks) return stored;
  return JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
}

function saveRoutine(r){
  save(ROUTINE_KEY,r);
  // 이력 저장 — savedAt = 오늘 자정 타임스탬프
  const today=new Date(); today.setHours(0,0,0,0);
  const entry={routine:JSON.parse(JSON.stringify(r)),savedAt:today.getTime()};
  const d=load(ROUTINE_HISTORY_KEY);
  if(!d.list) d.list=[];
  d.list=d.list.filter(e=>e.savedAt!==entry.savedAt); // 같은 날 저장은 덮어씀
  d.list.push(entry);
  if(d.list.length>52) d.list=d.list.slice(-52); // 최대 1년치
  save(ROUTINE_HISTORY_KEY,d);
}

// 특정 날짜에 적용할 루틴: 그 날짜보다 이전에 저장된 가장 최신 루틴
// 이력 없으면 DEFAULT_ROUTINE 사용
function getRoutineForDate(date){
  const history=load(ROUTINE_HISTORY_KEY).list||[];
  const dateTs=new Date(date).setHours(0,0,0,0);
  let best=null;
  for(const e of history){
    if(e.savedAt<dateTs&&(!best||e.savedAt>best.savedAt)) best=e;
  }
  return best?best.routine:JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
}

/* ══ SCHEDULE — 루틴 기반 ══ */
function getDayPlan(dayIndex, weekIndexOrEven, routineOverride){
  const routine=routineOverride||getRoutine();
  let wIdx;
  if(typeof weekIndexOrEven === 'boolean'){
    wIdx = weekIndexOrEven ? 0 : 1;
    wIdx = wIdx % routine.cycle;
  } else {
    wIdx = ((weekIndexOrEven % routine.cycle) + routine.cycle) % routine.cycle;
  }
  const week = routine.weeks[wIdx] || routine.weeks[0];
  const items = week[dayIndex] || [];
  return items.map(item=>({
    ...item,
    icon: typeIcon(item.type),
  }));
}

/* ══ CARD ══ */
function buildCard(dayIndex,date,todayDayIndex,offset){
  const today0=new Date();today0.setHours(0,0,0,0);
  const isToday=date.getTime()===today0.getTime();
  const isPast=date<today0;
  const dk=dkey(date);

  // 과거 날짜는 그 날짜 기준 루틴, 오늘/미래는 현재 루틴
  const routine=isPast?getRoutineForDate(date):getRoutine();
  const wIdx=((offset%routine.cycle)+routine.cycle)%routine.cycle;
  const plan=getDayPlan(dayIndex,wIdx,routine);

  // plan + extra 타입 합산 (저장된 탭 순서 적용, 삭제된 항목 제외)
  const removedTypes=getRemovedTypes(dk);
  const planTypes=plan.filter(p=>p.type!=='rest'&&!removedTypes.includes(p.type)).map(p=>p.type);
  const extraTypes=getExtraTypes(dk,planTypes);
  const rawTypes=[...new Set([...planTypes,...extraTypes])];
  const orderedTypes=getTabOrder(dk,rawTypes);
  const extraItems=extraTypes.map(t=>({
    type:t, icon:typeIcon(t), defaultName:typeDefName(t)
  }));
  // orderedTypes 순서로 allItems 구성
  const allItems=orderedTypes.map(type=>{
    return plan.find(p=>p.type===type) || extraItems.find(i=>i.type===type);
  }).filter(Boolean);
  // rest 항목은 맨 뒤에 추가
  const restItems=plan.filter(p=>p.type==='rest');
  allItems.push(...restItems);

  let actHTML='';
  allItems.forEach(item=>{
    if(item.type==='rest'){
      actHTML+=`<div class="activity">
        <span class="activity-icon">${item.icon}</span>
        <div class="activity-body"><div class="activity-title">${item.defaultName}</div></div>
        <span class="act-tag act-tag-rest">REST</span>
      </div>`;
      return;
    }
    const planName=getPlanName(dk,item.type,item.defaultName);
    const actual=getActual(dk,item.type);
    const done=getDone(dk,item.type);
    const hasMemo=!!getNote(dk,item.type);
    const dot=done?`<span class="done-dot done-dot-${item.type}"></span>`:'';
    let right;
    if(actual.length){
      const plus=actual.length>1?` +${actual.length-1}`:'';
      right=`<span class="card-chip card-chip-${item.type}">${actual[0]}${plus}</span>`;
    } else {
      right=`<span class="card-chip card-chip-${item.type}">${planName}</span>`;
    }
    const memoIcon=hasMemo?`<span style="font-size:11px;margin-left:4px;opacity:0.6;">📝</span>`:'';
    actHTML+=`<div class="activity" data-type="${item.type}">
      <span class="activity-icon">${item.icon}</span>
      <div class="activity-body">
        <div class="activity-title">${typeName(item.type)}${memoIcon}</div>
        <div class="activity-sub">${planName}</div>
      </div>
      ${right}${dot}
    </div>`;
  });

  // 아무 항목도 없으면 휴식 표시
  if(!actHTML){
    actHTML=`<div class="activity" style="cursor:default">
      <span class="activity-icon">💤</span>
      <div class="activity-body"><div class="activity-title">휴식</div></div>
      <span class="act-tag act-tag-rest">REST</span>
    </div>`;
  }

  const altNote=plan.find(p=>p.altNote)?.altNote;
  const altHTML=altNote?`<div class="alt-note">${altNote}</div>`:'';
  const DAY_SHORT_KO=['일','월','화','수','목','금','토'];
  const isHoliday=(dayIndex===0||dayIndex===6||isPublicHoliday(date));
  const dayClass=isHoliday?'card-dayname holiday':'card-dayname';
  const dateLabel_=`${date.getMonth()+1}/${date.getDate()} (${DAY_SHORT_KO[dayIndex]})`;
  const badge=isToday
    ?`<span class="today-badge">오늘</span>`
    :``;
  const cls=['day-card',isToday?'today':'',(isPast&&!isToday)?'past':''].filter(Boolean).join(' ');
  return`<div class="${cls}" data-dayindex="${dayIndex}" data-datekey="${dk}" data-date="${fmtFull(date)}" data-offset="${offset}">
    <div class="card-date-row"><span class="${dayClass}">${dateLabel_}</span>${badge}</div>
    <div class="activities">${actHTML}</div>${altHTML}
  </div>`;
}

/* ══ SLIDE ══ */
function buildSlideHTML(ws){
  const now=new Date();now.setHours(0,0,0,0);
  const offset=weekOffset(ws);
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  const isThis=ws.getTime()===getWeekStart(now).getTime();
  const diff=Math.round((ws-getWeekStart(now))/(7*86400000));
  const lbl=diff===0?`${ws.getFullYear()} · Week ${getWeekNum(ws)}`:diff===-1?'지난 주':diff===1?'다음 주':diff<0?`${Math.abs(diff)}주 전`:`${diff}주 후`;

  // 요약: done 기준 (plan + extra 타입 모두 포함)
  let golfDone=0,runDone=0,swimDone=0,tennisDone=0,bikeDone=0,totalDone=0;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const dk=dkey(d);
    const today0=new Date();today0.setHours(0,0,0,0);
    const isPastDay=d<today0;
    const dayRoutine=isPastDay?getRoutineForDate(d):getRoutine();
    const dayWIdx=((offset%dayRoutine.cycle)+dayRoutine.cycle)%dayRoutine.cycle;
    const plan=getDayPlan(i,dayWIdx,dayRoutine);
    const removedTypes=getRemovedTypes(dk);
    const planTypes=plan.filter(p=>p.type!=='rest'&&!removedTypes.includes(p.type)).map(p=>p.type);
    const extraTypes=getExtraTypes(dk,planTypes);
    const allTypes=[...new Set([...planTypes,...extraTypes])];
    let dayDone=false;
    allTypes.forEach(t=>{
      if(getDone(dk,t)){
        dayDone=true;
        if(t==='golf')   golfDone++;
        if(t==='run')    runDone++;
        if(t==='swim')   swimDone++;
        if(t==='tennis') tennisDone++;
        if(t==='bike')   bikeDone++;
      }
    });
    if(dayDone) totalDone++;
  }

  let cards='';
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);cards+=buildCard(i,d,now.getDay(),offset);}
  const dots='<div class="week-dots">'+[0,1,2,3,4].map(i=>`<div class="week-dot${i===2?' active':''}"></div>`).join('')+'</div>';
  const tm=isThis?`<span>오늘 ${now.getMonth()+1}월 ${now.getDate()}일 (${DAY_KO[now.getDay()]})</span>`:'';
  return`
  <div class="week-nav">
    <button class="nav-btn nav-btn-prev" id="btnPrev-${ws.getTime()}">‹</button>
    <div class="nav-center" id="navCenter" style="cursor:pointer" title="달력으로 이동"><div class="week-label">${lbl}</div>${dots}
      ${!isThis?`<button class="this-week-btn visible" id="btnToday-${ws.getTime()}">이번 주로</button>`:''}</div>
    <button class="nav-btn nav-btn-next" id="btnNext-${ws.getTime()}">›</button>
  </div>
  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h1>${isThis?'이번 주':lbl} <span>운동 일정</span></h1>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="nav-btn" id="searchBtn" title="메모 검색">🔍</button>
        <button class="nav-btn" id="settingsBtn" title="루틴 설정" style="background:rgba(163,230,53,0.08);border-color:rgba(163,230,53,0.18);">⚙️</button>
      </div>
    </div>
    <div class="header-meta">
      <span>${ws.getMonth()+1}월 ${ws.getDate()}일 (일) — ${we.getMonth()+1}월 ${we.getDate()}일 (토)</span>
      ${tm?'<span>·</span>'+tm:''}
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--lime)"></div>골프</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--sky)"></div>러닝</div>
    </div>
  </div>
  <div class="schedule-grid">${cards}</div>
  <div class="summary">
    <div class="summary-stat"><div class="summary-label">실제 기록</div><div class="summary-num">${totalDone}</div><div class="summary-desc">운동한 날</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-num" style="color:var(--lime)">${golfDone}</div><div class="summary-desc">⛳ 골프 완료</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-num" style="color:var(--sky)">${runDone}</div><div class="summary-desc">🏃 러닝 완료</div></div>
    ${swimDone>0||tennisDone>0||bikeDone>0?`
    <div class="summary-divider"></div>
    ${swimDone>0?`<div class="summary-stat"><div class="summary-num" style="color:var(--aqua)">${swimDone}</div><div class="summary-desc">🏊 수영 완료</div></div>`:''}
    ${tennisDone>0?`<div class="summary-stat"><div class="summary-num" style="color:var(--amber)">${tennisDone}</div><div class="summary-desc">🎾 테니스 완료</div></div>`:''}
    ${bikeDone>0?`<div class="summary-stat"><div class="summary-num" style="color:var(--green)">${bikeDone}</div><div class="summary-desc">🚴 자전거 완료</div></div>`:''}
    `:''}
  </div>
  <div class="swipe-hint">← 좌우로 밀어 주간 이동 →</div>`;
}

/* ══ WEEK NAV ══ */
const now0=new Date();now0.setHours(0,0,0,0);
let curWeek=getWeekStart(now0);
const track=document.getElementById('pageTrack');
const slides=[document.getElementById('slidePrev'),document.getElementById('slideCurr'),document.getElementById('slideNext')];

function renderSlides(){
  [-1,0,1].forEach((d,i)=>{slides[i].innerHTML=buildSlideHTML(addWeeks(curWeek,d));});
  wireNav();
  track.style.transition='none';
  track.style.transform='translateX(-100vw)';
}
function goWeek(delta){
  track.style.transition='transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94)';
  track.style.transform=`translateX(${delta>0?'-200vw':'0vw'})`;
  track.addEventListener('transitionend',function h(){track.removeEventListener('transitionend',h);curWeek=addWeeks(curWeek,delta);renderSlides();},{once:true});
}
function goToday(){curWeek=getWeekStart(new Date());renderSlides();}
function wireNav(){
  document.querySelectorAll('[id^="btnPrev-"]').forEach(b=>b.onclick=e=>{e.stopPropagation();goWeek(-1);});
  document.querySelectorAll('[id^="btnNext-"]').forEach(b=>b.onclick=e=>{e.stopPropagation();goWeek(1);});
  document.querySelectorAll('[id^="btnToday-"]').forEach(b=>b.onclick=e=>{e.stopPropagation();goToday();});
  document.querySelectorAll('#settingsBtn').forEach(b=>b.onclick=e=>{e.stopPropagation();openSettings();});
  document.querySelectorAll('#searchBtn').forEach(b=>b.onclick=e=>{e.stopPropagation();openSearch();});
  document.querySelectorAll('#navCenter').forEach(b=>b.onclick=e=>{
    if(e.target.closest('.this-week-btn')) return; // 이번주로 버튼 클릭은 제외
    e.stopPropagation();
    openCalPicker();
  });
  document.querySelectorAll('.day-card[data-dayindex]').forEach(card=>{
    card.onclick=e=>{
      e.stopPropagation();
      // 클릭한 activity 행의 타입 감지
      const act=e.target.closest('.activity[data-type]');
      const initialType=act?act.dataset.type:null;
      openModal(parseInt(card.dataset.dayindex),card.dataset.datekey,card.dataset.date,initialType,parseInt(card.dataset.offset));
    };
  });
}

/* ══ TOUCH SWIPE ══ */
const outerEl=document.getElementById('pageOuter');
let tx=0,ty=0,swiping=false,sdx=0,verticalLock=false;
outerEl.addEventListener('touchstart',e=>{
  if(document.getElementById('modalOverlay').classList.contains('open'))return;
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
  swiping=false;
  verticalLock=false;
  sdx=0;
  track.style.transition='none';
},{passive:true});

outerEl.addEventListener('touchmove',e=>{
  if(document.getElementById('modalOverlay').classList.contains('open'))return;
  const dx=e.touches[0].clientX-tx;
  const dy=e.touches[0].clientY-ty;
  if(verticalLock) return;
  if(!swiping){
    if(Math.abs(dx)<4&&Math.abs(dy)<4) return;
    if(Math.abs(dy)>Math.abs(dx)){verticalLock=true;return;}
    swiping=true;
  }
  sdx=dx;
  // 끝에 닿을수록 저항감 (rubber band)
  const resist=Math.abs(sdx)>window.innerWidth*0.5?0.3:1;
  track.style.transform=`translateX(calc(-100vw + ${sdx*resist}px))`;
},{passive:true});

outerEl.addEventListener('touchend',()=>{
  if(!swiping){swiping=false;return;}
  swiping=false;
  const thr=window.innerWidth*0.2;
  if(sdx<-thr) goWeek(1);
  else if(sdx>thr) goWeek(-1);
  else{
    track.style.transition='transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94)';
    track.style.transform='translateX(-100vw)';
  }
});

outerEl.addEventListener('touchcancel',()=>{
  if(!swiping) return;
  swiping=false;
  track.style.transition='transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94)';
  track.style.transform='translateX(-100vw)';
});
document.addEventListener('keydown',e=>{if(document.getElementById('modalOverlay').classList.contains('open'))return;if(e.key==='ArrowLeft')goWeek(-1);if(e.key==='ArrowRight')goWeek(1);});

/* ══ MODAL ══ */
// ctx: {dk, dayIndex, dateLabel, plan, activeType}
let ctx={};

function openModal(dayIndex,dk,dateLabel,initialType=null,offset=null){
  const today0=new Date();today0.setHours(0,0,0,0);
  const baseOffset=offset!==null?offset:weekOffset(getWeekStart(new Date()));
  // 날짜 계산 (카드의 실제 날짜)
  const ws=addWeeks(getWeekStart(today0),baseOffset-weekOffset(getWeekStart(today0)));
  const cardDate=new Date(ws);cardDate.setDate(ws.getDate()+dayIndex);
  const isPast=cardDate<today0;
  const routine=isPast?getRoutineForDate(cardDate):getRoutine();
  const wIdx=((baseOffset%routine.cycle)+routine.cycle)%routine.cycle;
  const plan=getDayPlan(dayIndex,wIdx,routine);
  const removedTypes=getRemovedTypes(dk);
  const planTypes=plan.filter(p=>p.type!=='rest'&&!removedTypes.includes(p.type)).map(p=>p.type);

  // ctx.tabs: 기본 계획 항목 + 추가된 extra 타입
  // extra: EXTRA_KEY에 저장된 추가 타입 (golf/run 중 planTypes에 없는 것)
  const extraTypes=getExtraTypes(dk,planTypes);
  const allTabTypes=getTabOrder(dk,[...new Set([...planTypes,...extraTypes])]);

  // 탭 아이템 빌드
  const tabs=allTabTypes.map(type=>{
    const planItem=plan.find(p=>p.type===type);
    return {type, defaultName: planItem?.defaultName||typeDefName(type), isExtra:!planTypes.includes(type)};
  });

  // 기본 선택 탭: initialType 있으면 그것, 없으면 첫번째
  const activeType=(initialType && allTabTypes.includes(initialType))
    ? initialType
    : allTabTypes[0]||'golf';

  ctx={dk,dayIndex,dateLabel,plan,planTypes,tabs,activeType};

  document.getElementById('modalDayname').textContent=DAY_KO[dayIndex];
  document.getElementById('modalDateTxt').textContent=dateLabel;
  // 모든 탭 사진 캐시 미리 로드
  Promise.all(tabs.map(t=>loadPhotoCache(dk,t.type))).then(()=>{
    renderModalTabs();
    renderModalPanes();
  });
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// localStorage에 저장된 extra 타입 가져오기 (planTypes에 없는 것)
const EXTRA_KEY='workout_extra_v5';
const REMOVED_KEY='workout_removed_v1'; // {dk:[type,...]} 날짜별 숨긴 기본 항목

function getRemovedTypes(dk){
  return load(REMOVED_KEY)[dk]||[];
}
function addRemovedType(dk,type){
  const d=load(REMOVED_KEY);
  if(!d[dk]) d[dk]=[];
  if(!d[dk].includes(type)) d[dk].push(type);
  save(REMOVED_KEY,d);
}
function restoreRemovedType(dk,type){
  const d=load(REMOVED_KEY);
  if(d[dk]) d[dk]=d[dk].filter(t=>t!==type);
  save(REMOVED_KEY,d);
}
const TAB_ORDER_KEY='workout_tab_order_v1'; // {dk -> [type, type, ...]}

function getTabOrder(dk, fallbackTypes){
  const d=load(TAB_ORDER_KEY);
  const stored=d[dk];
  if(stored){
    // 날짜별 저장된 순서 사용 (수동으로 탭 순서 바꾼 경우)
    const ordered=stored.filter(t=>fallbackTypes.includes(t));
    const missing=fallbackTypes.filter(t=>!ordered.includes(t));
    return [...ordered,...missing];
  }
  // 저장값 없으면 루틴 설정 순서(fallbackTypes)를 그대로 사용 — 동적으로 항상 최신 루틴 반영
  return fallbackTypes;
}
function saveTabOrder(dk,types){
  const d=load(TAB_ORDER_KEY);
  d[dk]=types;
  save(TAB_ORDER_KEY,d);
}
function getExtraTypes(dk,planTypes){
  const d=load(EXTRA_KEY);
  return (d[dk]||[]).filter(t=>!planTypes.includes(t));
}
function addExtraType(dk,type){
  const d=load(EXTRA_KEY);
  if(!d[dk]) d[dk]=[];
  if(!d[dk].includes(type)) d[dk].push(type);
  save(EXTRA_KEY,d);
}
function removeExtraType(dk,type){
  const d=load(EXTRA_KEY);
  if(d[dk]) d[dk]=d[dk].filter(t=>t!==type);
  save(EXTRA_KEY,d);
}

function renderModalTabs(){
  const tabsEl=document.getElementById('modalTabs');
  const {tabs,planTypes,activeType,dk}=ctx;

  // 추가 가능한 타입: 현재 탭에 없는 것 (삭제된 기본 항목 포함)
  const currentTypes=tabs.map(t=>t.type);
  const canAdd=['run','golf','swim','bike','tennis'].filter(t=>!currentTypes.includes(t));

  let html=tabs.map(t=>{
    const active=t.type===activeType;
    const icon=typeIcon(t.type);
    const lbl=typeName(t.type);
    // 탭이 1개여도 × 버튼 표시 (모두 삭제 시 휴식일)
    const removeBtn=`<span class="tab-remove" data-removetype="${t.type}" title="탭 삭제">×</span>`;
    return`<button class="modal-tab${active?` active-${t.type}`:''}" data-tabtype="${t.type}" draggable="true"><span class="tab-icon">${icon}</span><span>${lbl}</span>${removeBtn}</button>`;
  }).join('');

  // 추가 가능한 타입이 있으면 ＋ 버튼
  canAdd.forEach(type=>{
    const icon=typeIcon(type);
    const lbl=typeName(type);
    html+=`<button class="modal-tab tab-add-btn" data-addtabtype="${type}" title="${lbl} 탭 추가"><span class="tab-icon">${icon}</span><span>＋</span></button>`;
  });

  tabsEl.innerHTML=html;

  // 탭 클릭
  tabsEl.querySelectorAll('.modal-tab[data-tabtype]').forEach(btn=>{
    btn.onclick=e=>{
      if(e.target.closest('.tab-remove'))return;
      ctx.activeType=btn.dataset.tabtype;renderModalTabs();renderModalPanes();
    };
  });

  // 탭 드래그앤드롭 — 순서 변경
  let dragTabType=null;
  tabsEl.querySelectorAll('.modal-tab[data-tabtype]').forEach(btn=>{
    btn.addEventListener('dragstart',e=>{
      dragTabType=btn.dataset.tabtype;
      setTimeout(()=>btn.classList.add('tab-dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    btn.addEventListener('dragend',()=>{
      btn.classList.remove('tab-dragging');
      tabsEl.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('tab-drag-over'));
    });
    btn.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      tabsEl.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('tab-drag-over'));
      if(btn.dataset.tabtype!==dragTabType) btn.classList.add('tab-drag-over');
    });
    btn.addEventListener('dragleave',()=>{
      btn.classList.remove('tab-drag-over');
    });
    btn.addEventListener('drop',e=>{
      e.preventDefault();
      const tgtType=btn.dataset.tabtype;
      if(!tgtType||tgtType===dragTabType) return;
      const srcIdx=ctx.tabs.findIndex(t=>t.type===dragTabType);
      const tgtIdx=ctx.tabs.findIndex(t=>t.type===tgtType);
      if(srcIdx===-1||tgtIdx===-1) return;
      const [moved]=ctx.tabs.splice(srcIdx,1);
      ctx.tabs.splice(tgtIdx,0,moved);
      saveTabOrder(ctx.dk,ctx.tabs.map(t=>t.type));
      renderModalTabs();
      renderSlides();
    });
  });

  // extra 탭 제거 버튼
  tabsEl.querySelectorAll('.tab-remove[data-removetype]').forEach(span=>{
    span.onclick=e=>{
      e.stopPropagation();
      const type=span.dataset.removetype;
      const tab=ctx.tabs.find(t=>t.type===type);
      if(tab?.isExtra){
        // extra 탭 제거
        removeExtraType(ctx.dk,type);
      } else {
        // 기본 계획 탭 — 해당 날짜에서만 숨김
        addRemovedType(ctx.dk,type);
      }
      ctx.tabs=ctx.tabs.filter(t=>t.type!==type);
      if(ctx.activeType===type) ctx.activeType=ctx.tabs[0]?.type||'golf';
      renderModalTabs();renderModalPanes();renderSlides();
    };
  });

  // ＋ 탭 추가 버튼
  tabsEl.querySelectorAll('[data-addtabtype]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const type=btn.dataset.addtabtype;
      const removedTypes=getRemovedTypes(ctx.dk);
      const isPlanType=ctx.planTypes.includes(type)||removedTypes.includes(type);
      if(isPlanType){
        // 기본 항목 복원
        restoreRemovedType(ctx.dk,type);
        const planItem=ctx.plan.find(p=>p.type===type);
        ctx.tabs=[...ctx.tabs,{type,defaultName:planItem?.defaultName||typeDefName(type),isExtra:false}];
      } else {
        // 새 extra 항목 추가
        addExtraType(ctx.dk,type);
        ctx.tabs=[...ctx.tabs,{type,defaultName:typeDefName(type),isExtra:true}];
      }
      ctx.activeType=type;
      renderModalTabs();renderModalPanes();renderSlides();
    };
  });
}

function renderModalPanes(){
  const panesEl=document.getElementById('modalPanes');
  panesEl.innerHTML=ctx.tabs.map(t=>buildPane(t)).join('');
  // show only active pane
  panesEl.querySelectorAll('.tab-pane').forEach(p=>{
    p.style.display=p.dataset.ptype===ctx.activeType?'block':'none';
  });
  bindPaneEvents();
}

function buildPane(item){
  const {dk}=ctx;
  const type=item.type;
  const planName=getPlanName(dk,type,item.defaultName);
  const actual=getActual(dk,type);
  const done=getDone(dk,type);
  const note=getNote(dk,type);

  // changed chips
  const chipsHTML=actual.length
    ? actual.map((lbl,i)=>`<div class="changed-chip changed-chip-${type}"><span>${esc(lbl)}</span><button class="chip-x" data-type="${type}" data-idx="${i}">×</button></div>`).join('')
    : `<span class="no-changed">변경 사항 없음</span>`;

  // done label
  const doneLabel=actual.length ? actual.join(', ') : planName;

  // note
  const noteTA=`<textarea class="note-ta" id="noteTa-${type}" placeholder="메모...">${esc(note)}</textarea>`;

  const photos=getPhotosCached(dk,type);
  const MAX_PHOTOS=5;
  const photoThumbsHTML=photos.map((src,i)=>`
    <div class="photo-thumb" id="photoThumb-${type}-${i}">
      <div class="photo-thumb-view" data-photoidx="${i}" data-phototype="${type}"></div>
      <img src="${src}" alt="운동 사진 ${i+1}">
      <button class="photo-thumb-del" data-delidx="${i}" data-deltype="${type}">×</button>
